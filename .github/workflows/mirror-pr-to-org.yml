# .github/workflows/mirror-pr-to-org.yml
# Auto-mirror a fork PR to the org (owner request). The fork PR is `branch -> seed/linux-x86_64`.
# The mirror opens, on the org, a CROSS-FORK PR `fork:branch -> org:branch` — same branch name on
# both sides. That org branch already exists on the org (here it is the umbrella
# `remodel/emit-throughput`); the fork's copy carries the newer commits, and GitHub compares across
# the fork network.
#
# WHY cross-fork (no push, no alias): `schivei/teko-lang` is a fork of `teko-org/teko-lang`, so a PR
# can be opened straight from the fork branch into the org's same-named branch — nothing is pushed to
# the org. This is exactly what the org's ruleset wants (GH013: "changes must be made through a pull
# request"): the PR IS the change. Earlier attempts pushed the branch to the org (rejected by the
# ruleset) and invented `promote/*` aliases — all unnecessary. The org NEVER has `seed/*`; the org PR
# base is the branch name itself (the org's umbrella), not the fork PR's seed base.
#
# REQUIRES a repo secret `ORG_PR_TOKEN` — a PAT (or GitHub App token) with `pull-requests:write` on
# `teko-org/teko-lang` (contents write is NOT needed — nothing is pushed). Without it this fails loud.
#
# Scope: fork repo only; fires on fork PRs whose base is seed/linux-x86_64; head ≠ seed and ≠ main.
name: Mirror PR to org

on:
  pull_request:
    # opened/reopened create the org PR; synchronize/edited keep it in sync (the step is idempotent:
    # it edits the existing org PR, and a cross-fork PR auto-tracks new commits on the fork branch —
    # no push needed, so synchronize needs no branch update, just a title/body refresh).
    types: [opened, reopened, synchronize, edited]
    branches: [seed/linux-x86_64]   # only PRs whose BASE is the seed branch

permissions:
  contents: read

concurrency:
  group: mirror-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  mirror:
    # fork only; head is any branch EXCEPT the seed itself or main
    if: >-
      github.repository == 'schivei/teko-lang' &&
      github.event.pull_request.head.ref != 'seed/linux-x86_64' &&
      github.event.pull_request.head.ref != 'main'
    runs-on: ubuntu-latest
    env:
      ORG: teko-org/teko-lang
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
      TITLE: ${{ github.event.pull_request.title }}
      BODY: ${{ github.event.pull_request.body }}
      NUM: ${{ github.event.pull_request.number }}
      GH_TOKEN: ${{ secrets.ORG_PR_TOKEN }}
    steps:
      - name: Guard — secret present
        run: |
          set -eu
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::ORG_PR_TOKEN secret is required (pull-requests:write on $ORG). No org PR created."
            exit 1
          fi

      - name: Open (or update) the cross-fork org PR (fork:branch -> org:branch)
        run: |
          set -eu
          FORK_OWNER="${GITHUB_REPOSITORY%%/*}"   # e.g. schivei
          # Build the mirrored body in a FILE via printf %s — the fork PR body ($BODY) is arbitrary
          # Markdown (backticks, quotes, $, newlines); inlining it into a double-quoted assignment
          # broke the shell parse. printf %s takes each value literally; --body-file avoids re-quoting.
          BODY_FILE="$RUNNER_TEMP/org-pr-body.md"
          {
            printf '%s\n\n---\n' "$BODY"
            printf 'Mirrored from %s#%s (%s:%s -> %s). Titles/bodies kept in sync for the org-side merge.\n' \
              "$GITHUB_REPOSITORY" "$NUM" "$FORK_OWNER" "$HEAD_REF" "$HEAD_REF"
          } > "$BODY_FILE"
          # Find an already-open cross-fork PR (same fork head branch, same org base branch).
          EXIST="$(gh pr list --repo "$ORG" --state open --base "$HEAD_REF" \
                     --json number,headRefName,headRepositoryOwner \
                     --jq "[.[] | select(.headRefName==\"$HEAD_REF\" and .headRepositoryOwner.login==\"$FORK_OWNER\")][0].number" \
                     2>/dev/null || true)"
          if [ -n "${EXIST:-}" ] && [ "$EXIST" != "null" ]; then
            gh pr edit "$EXIST" --repo "$ORG" --title "$TITLE" --body-file "$BODY_FILE"
            echo "Updated org PR #$EXIST ($FORK_OWNER:$HEAD_REF -> $HEAD_REF)"
          else
            gh pr create --repo "$ORG" \
              --head "${FORK_OWNER}:${HEAD_REF}" --base "$HEAD_REF" \
              --title "$TITLE" --body-file "$BODY_FILE" --draft
            echo "Opened org draft PR ($FORK_OWNER:$HEAD_REF -> $HEAD_REF)"
          fi
