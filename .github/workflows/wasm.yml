name: WASM Layer A (cooperative — wasmtime & browser)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# See native.yml for the path-filter + always-running `gate` rationale (required
# checks must never be skipped at the workflow level, or the PR blocks forever).
jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.f.outputs.run }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            run:
              - 'src/**'
              - 'CMakeLists.txt'
              - 'runtime/wasm/**'
              - '.github/workflows/wasm.yml'

  wasm-wasmtime:
    name: WASM exec — emitter + references under Node + wasmtime
    needs: changes
    if: ${{ needs.changes.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
      - name: Install toolchain (clang / ninja / WABT) + wasmtime
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list /etc/apt/sources.list.d/azure*.list /etc/apt/sources.list.d/azure-cli*.list 2>/dev/null || true
          sudo apt-get update
          # lld provides wasm-ld for the Phase 13 crypto reactor (C runtime -> wasm32).
          sudo apt-get install -y cmake ninja-build clang lld wabt
          # The wasmtime installer downloads a release tarball and can flake on the network
          # (seen: ~/.wasmtime/bin/wasmtime missing -> later exit 127). Retry, then verify the
          # binary actually landed so a failed install fails THIS step with a clear message.
          for i in 1 2 3; do
            curl -sSfL https://wasmtime.dev/install.sh | bash && break
            echo "wasmtime install attempt $i failed; retrying in 5s"; sleep 5
          done
          test -x "$HOME/.wasmtime/bin/wasmtime" || { echo "::error::wasmtime install failed after retries"; exit 1; }
          "$HOME/.wasmtime/bin/wasmtime" --version
      - name: Build the compiler core + teko driver (Release)
        run: |
          cmake -S . -B build -G "Ninja" -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target teko_core teko --parallel 4
      - name: Emit real concurrency modules from the Teko backend
        run: |
          cc -I src runtime/wasm/emit-demo/emit_spawn_channel.c build/libteko_core.a -o emit_spawn_channel
          cc -I src runtime/wasm/emit-demo/emit_suspend.c       build/libteko_core.a -o emit_suspend
          cc -I src runtime/wasm/emit-demo/emit_multi.c         build/libteko_core.a -o emit_multi
          cc -I src runtime/wasm/emit-demo/emit_ffi.c           build/libteko_core.a -o emit_ffi
          ./emit_spawn_channel runtime/wasm/samples/emitted.wat
          ./emit_suspend        runtime/wasm/samples/emitted_suspend.wat
          ./emit_multi          runtime/wasm/samples/emitted_multi.wat
          ./emit_ffi            runtime/wasm/samples/emitted_ffi.wat
      - name: Compile REAL .tks to WASM with the teko binary (no emit-demo, no mock)
        run: |
          ./build/teko build runtime/wasm/samples/hello.tks --target=wasm -o runtime/wasm/samples/hello.wat
          ./build/teko build runtime/wasm/samples/codec.tks --target=wasm -o runtime/wasm/samples/codec.wat
          ./build/teko build runtime/wasm/samples/hash.tks  --target=wasm -o runtime/wasm/samples/hash.wat
          ./build/teko build runtime/wasm/samples/uuid.tks  --target=wasm -o runtime/wasm/samples/uuid.wat
          ./build/teko build runtime/wasm/samples/random.tks --target=wasm -o runtime/wasm/samples/random.wat
          ./build/teko build runtime/wasm/samples/uuid_rng.tks --target=wasm -o runtime/wasm/samples/uuid_rng.wat
          ./build/teko build runtime/wasm/samples/routines.tks --target=wasm -o runtime/wasm/samples/routines.wat
          ./build/teko build runtime/wasm/samples/duplex.tks --target=wasm -o runtime/wasm/samples/duplex.wat
          ./build/teko build runtime/wasm/samples/delayed.tks --target=wasm -o runtime/wasm/samples/delayed.wat
          ./build/teko build runtime/wasm/samples/broadcast.tks --target=wasm -o runtime/wasm/samples/broadcast.wat
          ./build/teko build runtime/wasm/samples/shared.tks --target=wasm -o runtime/wasm/samples/shared.wat
          ./build/teko build runtime/wasm/samples/waiters.tks --target=wasm -o runtime/wasm/samples/waiters.wat
          ./build/teko build runtime/wasm/samples/controlflow.tks --target=wasm -o runtime/wasm/samples/controlflow.wat
          ./build/teko build runtime/wasm/samples/resilience.tks --target=wasm -o runtime/wasm/samples/resilience.wat
          ./build/teko build runtime/wasm/samples/capstone.tks --target=wasm -o runtime/wasm/samples/capstone.wat
          ./build/teko build runtime/wasm/samples/producer_consumer.tks --target=wasm -o runtime/wasm/samples/producer_consumer.wat
          ./build/teko build runtime/wasm/samples/time.tks --target=wasm -o runtime/wasm/samples/time.wat
          ./build/teko build runtime/wasm/samples/class.tks --target=wasm -o runtime/wasm/samples/class.wat
          ./build/teko build runtime/wasm/samples/method_arg.tks --target=wasm -o runtime/wasm/samples/method_arg.wat
          ./build/teko build runtime/wasm/samples/trait_arg.tks --target=wasm -o runtime/wasm/samples/trait_arg.wat

          ./build/teko build runtime/wasm/samples/traits.tks --target=wasm -o runtime/wasm/samples/traits.wat


          ./build/teko build runtime/wasm/samples/generics.tks --target=wasm -o runtime/wasm/samples/generics.wat



          ./build/teko build runtime/wasm/samples/eventbus.tks --target=wasm -o runtime/wasm/samples/eventbus.wat

          ./build/teko build runtime/wasm/samples/convert.tks --target=wasm -o runtime/wasm/samples/convert.wat

          ./build/teko build runtime/wasm/samples/concat.tks --target=wasm -o runtime/wasm/samples/concat.wat

          ./build/teko build runtime/wasm/samples/interp.tks --target=wasm -o runtime/wasm/samples/interp.wat

          ./build/teko build runtime/wasm/samples/tostring.tks --target=wasm -o runtime/wasm/samples/tostring.wat

          ./build/teko build runtime/wasm/samples/format.tks --target=wasm -o runtime/wasm/samples/format.wat

          ./build/teko build runtime/wasm/samples/parse.tks --target=wasm -o runtime/wasm/samples/parse.wat
          ./build/teko build runtime/wasm/samples/parse_fail.tks --target=wasm -o runtime/wasm/samples/parse_fail.wat

          ./build/teko build runtime/wasm/samples/float.tks --target=wasm -o runtime/wasm/samples/float.wat

          ./build/teko build runtime/wasm/samples/cast.tks --target=wasm -o runtime/wasm/samples/cast.wat
          ./build/teko build runtime/wasm/samples/cast_fail.tks --target=wasm -o runtime/wasm/samples/cast_fail.wat

          ./build/teko build runtime/wasm/samples/floatstr.tks --target=wasm -o runtime/wasm/samples/floatstr.wat
          ./build/teko build runtime/wasm/samples/parsefloat.tks --target=wasm -o runtime/wasm/samples/parsefloat.wat
          ./build/teko build runtime/wasm/samples/parsefloat_fail.tks --target=wasm -o runtime/wasm/samples/parsefloat_fail.wat

          ./build/teko build runtime/wasm/samples/decimal.tks --target=wasm -o runtime/wasm/samples/decimal.wat
          ./build/teko build runtime/wasm/samples/decimal_surface.tks --target=wasm -o runtime/wasm/samples/decimal_surface.wat
          ./build/teko build runtime/wasm/samples/decimal_fail.tks --target=wasm -o runtime/wasm/samples/decimal_fail.wat

          ./build/teko build runtime/wasm/samples/optionals.tks --target=wasm -o runtime/wasm/samples/optionals.wat
          ./build/teko build runtime/wasm/samples/safenav.tks --target=wasm -o runtime/wasm/samples/safenav.wat
          ./build/teko build runtime/wasm/samples/defer.tks --target=wasm -o runtime/wasm/samples/defer.wat
          ./build/teko build runtime/wasm/samples/comptime.tks --target=wasm -o runtime/wasm/samples/comptime.wat

          ./build/teko build runtime/wasm/samples/arrays.tks --target=wasm -o runtime/wasm/samples/arrays.wat
          ./build/teko build runtime/wasm/samples/arrays_fail.tks --target=wasm -o runtime/wasm/samples/arrays_fail.wat

          ./build/teko build runtime/wasm/samples/foreach.tks --target=wasm -o runtime/wasm/samples/foreach.wat
          ./build/teko build runtime/wasm/samples/iarray.tks --target=wasm -o runtime/wasm/samples/iarray.wat
          ./build/teko build runtime/wasm/samples/iarray_fail.tks --target=wasm -o runtime/wasm/samples/iarray_fail.wat
          ./build/teko build runtime/wasm/samples/soa.tks --target=wasm -o runtime/wasm/samples/soa.wat
          ./build/teko build runtime/wasm/samples/aos.tks --target=wasm -o runtime/wasm/samples/aos.wat
          ./build/teko build runtime/wasm/samples/simd.tks --target=wasm -o runtime/wasm/samples/simd.wat
      - name: Build the crypto reactor (C runtime -> wasm32) + compile crypto .tks proofs
        run: |
          # Compile the single C crypto runtime to a wasm32 reactor module the emitted
          # crypto modules import (Phase 13 Sub-phase C "big step"). clang ships wasm32;
          # wasm-ld comes from lld (installed above).
          bash runtime/wasm/crypto/build-crypto-reactor.sh runtime/wasm/crypto/crypto.wasm
          for s in crypto_hash crypto_hmac crypto_aead crypto_sign crypto_kdf crypto_rsa; do
            ./build/teko build runtime/wasm/samples/$s.tks --target=wasm -o runtime/wasm/samples/$s.wat
          done
      - name: Assemble all modules (wat2wasm)
        run: |
          wat2wasm runtime/wasm/samples/channels.wat        -o runtime/wasm/samples/channels.wasm
          wat2wasm runtime/wasm/samples/scheduler.wat       -o runtime/wasm/samples/scheduler.wasm
          wat2wasm runtime/wasm/samples/emitted.wat         -o runtime/wasm/samples/emitted.wasm
          wat2wasm runtime/wasm/samples/emitted_suspend.wat -o runtime/wasm/samples/emitted_suspend.wasm
          wat2wasm runtime/wasm/samples/emitted_multi.wat   -o runtime/wasm/samples/emitted_multi.wasm
          wat2wasm runtime/wasm/samples/emitted_ffi.wat     -o runtime/wasm/samples/emitted_ffi.wasm
          wat2wasm runtime/wasm/samples/hello.wat           -o runtime/wasm/samples/hello.wasm
          wat2wasm runtime/wasm/samples/codec.wat           -o runtime/wasm/samples/codec.wasm
          wat2wasm runtime/wasm/samples/hash.wat            -o runtime/wasm/samples/hash.wasm
          wat2wasm runtime/wasm/samples/uuid.wat            -o runtime/wasm/samples/uuid.wasm
          wat2wasm runtime/wasm/samples/random.wat          -o runtime/wasm/samples/random.wasm
          wat2wasm runtime/wasm/samples/uuid_rng.wat        -o runtime/wasm/samples/uuid_rng.wasm
          wat2wasm runtime/wasm/samples/routines.wat        -o runtime/wasm/samples/routines.wasm
          wat2wasm runtime/wasm/samples/duplex.wat          -o runtime/wasm/samples/duplex.wasm
          wat2wasm runtime/wasm/samples/delayed.wat         -o runtime/wasm/samples/delayed.wasm
          wat2wasm runtime/wasm/samples/broadcast.wat       -o runtime/wasm/samples/broadcast.wasm
          wat2wasm runtime/wasm/samples/shared.wat          -o runtime/wasm/samples/shared.wasm
          wat2wasm runtime/wasm/samples/waiters.wat         -o runtime/wasm/samples/waiters.wasm
          wat2wasm runtime/wasm/samples/controlflow.wat     -o runtime/wasm/samples/controlflow.wasm
          wat2wasm runtime/wasm/samples/resilience.wat      -o runtime/wasm/samples/resilience.wasm
          wat2wasm runtime/wasm/samples/capstone.wat        -o runtime/wasm/samples/capstone.wasm
          wat2wasm runtime/wasm/samples/producer_consumer.wat -o runtime/wasm/samples/producer_consumer.wasm
          wat2wasm runtime/wasm/samples/time.wat            -o runtime/wasm/samples/time.wasm
          wat2wasm runtime/wasm/samples/class.wat           -o runtime/wasm/samples/class.wasm
          wat2wasm runtime/wasm/samples/method_arg.wat      -o runtime/wasm/samples/method_arg.wasm
          wat2wasm runtime/wasm/samples/trait_arg.wat       -o runtime/wasm/samples/trait_arg.wasm

          wat2wasm runtime/wasm/samples/traits.wat          -o runtime/wasm/samples/traits.wasm


          wat2wasm runtime/wasm/samples/generics.wat        -o runtime/wasm/samples/generics.wasm



          wat2wasm runtime/wasm/samples/eventbus.wat        -o runtime/wasm/samples/eventbus.wasm
          wat2wasm runtime/wasm/samples/convert.wat         -o runtime/wasm/samples/convert.wasm
          wat2wasm runtime/wasm/samples/concat.wat          -o runtime/wasm/samples/concat.wasm
          wat2wasm runtime/wasm/samples/interp.wat          -o runtime/wasm/samples/interp.wasm
          wat2wasm runtime/wasm/samples/tostring.wat        -o runtime/wasm/samples/tostring.wasm
          wat2wasm runtime/wasm/samples/format.wat          -o runtime/wasm/samples/format.wasm
          wat2wasm runtime/wasm/samples/parse.wat           -o runtime/wasm/samples/parse.wasm
          wat2wasm runtime/wasm/samples/parse_fail.wat      -o runtime/wasm/samples/parse_fail.wasm
          wat2wasm runtime/wasm/samples/float.wat           -o runtime/wasm/samples/float.wasm
          wat2wasm runtime/wasm/samples/cast.wat            -o runtime/wasm/samples/cast.wasm
          wat2wasm runtime/wasm/samples/cast_fail.wat       -o runtime/wasm/samples/cast_fail.wasm
          wat2wasm runtime/wasm/samples/floatstr.wat        -o runtime/wasm/samples/floatstr.wasm
          wat2wasm runtime/wasm/samples/parsefloat.wat      -o runtime/wasm/samples/parsefloat.wasm
          wat2wasm runtime/wasm/samples/parsefloat_fail.wat -o runtime/wasm/samples/parsefloat_fail.wasm
          wat2wasm runtime/wasm/samples/decimal.wat         -o runtime/wasm/samples/decimal.wasm
          wat2wasm runtime/wasm/samples/decimal_surface.wat -o runtime/wasm/samples/decimal_surface.wasm
          wat2wasm runtime/wasm/samples/decimal_fail.wat    -o runtime/wasm/samples/decimal_fail.wasm
          wat2wasm runtime/wasm/samples/optionals.wat       -o runtime/wasm/samples/optionals.wasm
          wat2wasm runtime/wasm/samples/safenav.wat         -o runtime/wasm/samples/safenav.wasm
          wat2wasm runtime/wasm/samples/defer.wat            -o runtime/wasm/samples/defer.wasm
          wat2wasm runtime/wasm/samples/comptime.wat         -o runtime/wasm/samples/comptime.wasm
          wat2wasm runtime/wasm/samples/arrays.wat           -o runtime/wasm/samples/arrays.wasm
          wat2wasm runtime/wasm/samples/arrays_fail.wat      -o runtime/wasm/samples/arrays_fail.wasm
          wat2wasm runtime/wasm/samples/foreach.wat          -o runtime/wasm/samples/foreach.wasm
          wat2wasm runtime/wasm/samples/iarray.wat           -o runtime/wasm/samples/iarray.wasm
          wat2wasm runtime/wasm/samples/iarray_fail.wat      -o runtime/wasm/samples/iarray_fail.wasm
          wat2wasm runtime/wasm/samples/soa.wat              -o runtime/wasm/samples/soa.wasm
          wat2wasm runtime/wasm/samples/aos.wat              -o runtime/wasm/samples/aos.wasm
          wat2wasm runtime/wasm/samples/simd.wat             -o runtime/wasm/samples/simd.wasm
          for s in crypto_hash crypto_hmac crypto_aead crypto_sign crypto_kdf crypto_rsa; do
            wat2wasm runtime/wasm/samples/$s.wat -o runtime/wasm/samples/$s.wasm
          done
      - name: Run under Node (channels=42, scheduler=15, emitted=7, suspend=30, multi=15)
        run: node runtime/wasm/run-node.mjs
      - name: Run Browser-FFI proof under Node (host env.log reads pooled string)
        run: node runtime/wasm/run-ffi.mjs
      - name: Run SOURCE→WASM proof under Node (teko-compiled hello.tks)
        run: node runtime/wasm/run-source.mjs
      - name: Run routines proof under Node (teko-compiled routines.tks — background tasks drained at exit)
        run: node runtime/wasm/run-routines.mjs
      - name: Run base64/hex codec proof under Node (teko-compiled codec.tks)
        run: node runtime/wasm/run-codec.mjs
      - name: Run native SHA-256 proof under Node (teko-compiled hash.tks, FIPS 180-4)
        run: node runtime/wasm/run-hash.mjs
      - name: Run native UUID v3/v5 proof under Node (teko-compiled uuid.tks, RFC 4122)
        run: node runtime/wasm/run-uuid.mjs
      - name: Run CSPRNG host-entropy proof under Node (teko-compiled random.tks, env.teko_random)
        run: node runtime/wasm/run-random.mjs
      - name: Run UUID v4/v7 host proof under Node (teko-compiled uuid_rng.tks, env.teko_random + env.teko_now)
        run: node runtime/wasm/run-uuid-rng.mjs
      - name: Run allocator stress under Node (alloc/free/coalesce/double-free/reset)
        run: node runtime/wasm/run-alloc.mjs
      - name: Run FULL crypto surface proof under Node (teko-compiled crypto_*.tks via the C reactor)
        run: node runtime/wasm/run-crypto.mjs
      - name: Run duplex channel proof under Node (teko-compiled duplex.tks via the C reactor)
        run: node runtime/wasm/run-duplex.mjs
      - name: Run delayed channel proof under Node (teko-compiled delayed.tks via the C reactor)
        run: node runtime/wasm/run-delayed.mjs
      - name: Run broadcast channel proof under Node (teko-compiled broadcast.tks via the C reactor)
        run: node runtime/wasm/run-broadcast.mjs
      - name: Run shared-memory proof under Node (teko-compiled shared.tks via the C reactor)
        run: node runtime/wasm/run-shared.mjs
      - name: Run timespan waiters proof under Node (teko-compiled waiters.tks — wait/await)
        run: node runtime/wasm/run-waiters.mjs
      - name: Run control-flow proof under Node (teko-compiled controlflow.tks — while/loop/if/break)
        run: node runtime/wasm/run-controlflow.mjs
      - name: Run resilience proof under Node (teko-compiled resilience.tks — retry/circuit via reactor)
        run: node runtime/wasm/run-resilience.mjs
      - name: Run Phase 14 capstone under Node (teko-compiled capstone.tks — functions+routines+loops+channels+waiters)
        run: node runtime/wasm/run-capstone.mjs
      - name: Run producer/consumer under Node (teko-compiled producer_consumer.tks — multi-arg routine + shared channel)
        run: node runtime/wasm/run-producer-consumer.mjs
      - name: Run wall-clock/timezone proof under Node (teko-compiled time.tks — OS civil time via reactor + host clock)
        run: node runtime/wasm/run-time.mjs
      - name: Run concrete-class proof under Node (teko-compiled class.tks — Phase 15 fields + static method dispatch)
        run: node runtime/wasm/run-class.mjs
      - name: Run method-call-as-argument regression proof under Node (teko-compiled method_arg.tks — Phase 15.A OP_CALL_FUNC in argument position)
        run: node runtime/wasm/run-method-arg.mjs
      - name: Run trait-dispatch-as-argument regression proof under Node (teko-compiled trait_arg.tks — Phase 15.B vtable_get + OP_CALL_FUNC in argument position)
        run: node runtime/wasm/run-trait-arg.mjs

      - name: Run trait dynamic-dispatch proof under Node (teko-compiled traits.tks — Phase 15.B static vtable + to_string)
        run: node runtime/wasm/run-traits.mjs
      - name: Run generics proof under Node (teko-compiled generics.tks — Phase 15.C per-type monomorphization)
        run: node runtime/wasm/run-generics.mjs
      - name: Run event subsystem proof under Node (teko-compiled eventbus.tks — Phase 15.D raise fan-out)
        run: node runtime/wasm/run-eventbus.mjs
      - name: Run conversion proof under Node (teko-compiled convert.tks — Phase 16.A culture-invariant to_string/concat via reactor)
        run: node runtime/wasm/run-convert.mjs
      - name: Run concatenation proof under Node (teko-compiled concat.tks -- Phase 16.B auto-to_string on + via reactor)
        run: node runtime/wasm/run-concat.mjs
      - name: Run interpolation proof under Node (teko-compiled interp.tks -- Phase 16.C string interpolation auto-to_string)
        run: node runtime/wasm/run-interp.mjs
      - name: Run user-type to_string proof under Node (teko-compiled tostring.tks -- Phase 16.D to_string dispatch + synthesized default)
        run: node runtime/wasm/run-tostring.mjs
      - name: Run explicit-format proof under Node (teko-compiled format.tks -- Phase 16.E radix/pad/group)
        run: node runtime/wasm/run-format.mjs
      - name: Run checked-parse proof under Node (teko-compiled parse.tks/parse_fail.tks -- Phase 16.F fail-loud)
        run: node runtime/wasm/run-parse.mjs
      - name: Run f64 value-model proof under Node (teko-compiled float.tks -- Phase 17.A, byte-identical to native)
        run: node runtime/wasm/run-float.mjs
      - name: Run int<->float cast proof under Node (teko-compiled cast.tks/cast_fail.tks -- Phase 17.B checked + fail-loud)
        run: node runtime/wasm/run-cast.mjs
      - name: Run float->string proof under Node (teko-compiled floatstr.tks -- Phase 17.D id 50 f64-arg + auto-to_string, byte-identical to native)
        run: node runtime/wasm/run-floatstr.mjs
      - name: Run parse_float proof under Node (teko-compiled parsefloat.tks -- Phase 17.E id 54 str->f64 checked, byte-identical to native + fail-loud trap)
        run: node runtime/wasm/run-parsefloat.mjs
      - name: Run decimal value-model proof under Node (teko-compiled decimal.tks -- Phase 17.F.3 256-byte decimal DCONST/arith/compare/locals, byte-identical to native)
        run: node runtime/wasm/run-decimal.mjs
      - name: Run decimal SURFACE proof under Node (teko-compiled decimal_surface.tks -- Phase 17.F.4 decimal.to_string/parse + int/float<->decimal casts + auto-to_string, byte-identical to native + fail-loud trap)
        run: node runtime/wasm/run-decimal-surface.mjs
      - name: Run optionals proof under Node (teko-compiled optionals.tks -- Phase 18.A zero-overhead ?T/null/?? Elvis via OP_IF, byte-identical to native)
        run: node runtime/wasm/run-optionals.mjs
      - name: Run safe-navigation proof under Node (teko-compiled safenav.tks -- Phase 18.B ?. null-propagation over optional objects via OP_IF, byte-identical to native)
        run: node runtime/wasm/run-safenav.mjs
      - name: Run defer proof under Node (teko-compiled defer.tks -- Phase 18.C LIFO scope-exit registration, byte-identical to native)
        run: node runtime/wasm/run-defer.mjs
      - name: Run comptime proof under Node (teko-compiled comptime.tks -- Phase 18.D compile-time constant folding, byte-identical to native)
        run: node runtime/wasm/run-comptime.mjs
      - name: Run arrays proof under Node (teko-compiled arrays.tks -- Phase 18.E.1 fixed-size contiguous array literal/index/.len, byte-identical to native)
        run: node runtime/wasm/run-arrays.mjs
      - name: Run arrays fail-loud proof under Node (teko-compiled arrays_fail.tks -- Phase 18.E.1 out-of-bounds index TRAPS, native exit 70)
        run: node runtime/wasm/run-arrays-fail.mjs
      - name: Run foreach proof under Node (teko-compiled foreach.tks -- Phase 18.E.2 `for x in array` iteration, byte-identical to native)
        run: node runtime/wasm/run-foreach.mjs
      - name: Run iarray proof under Node (teko-compiled iarray.tks -- Phase 18.E.2 typed i32[] packed array literal/index/.len/for, byte-identical to native)
        run: node runtime/wasm/run-iarray.mjs
      - name: Run iarray fail-loud proof under Node (teko-compiled iarray_fail.tks -- Phase 18.E.2 out-of-bounds index TRAPS, native exit 70)
        run: node runtime/wasm/run-iarray-fail.mjs
      - name: Run SoA proof under Node (teko-compiled soa.tks -- Phase 18.E.3 structure-of-arrays - k contiguous i32 field runs, s[i].field r/w, whole-run s.field accessor, byte-identical to native)
        run: node runtime/wasm/run-soa.mjs
      - name: Run AoS proof under Node (teko-compiled aos.tks -- Phase 18.E.3 array-of-objects - a[i].field index-then-member, same logical result as SoA, byte-identical to native)
        run: node runtime/wasm/run-aos.mjs
      - name: Run SIMD proof under Node (teko-compiled simd.tks -- Phase 18.E.4 REAL simd128 v128.load/i32x4.add kernel for simd.sum over i32[]/SoA field run, output-identical to native + in-program scalar self-check)
        run: node runtime/wasm/run-simd.mjs
      - name: Run under wasmtime
        run: |
          ~/.wasmtime/bin/wasmtime run --invoke test runtime/wasm/samples/channels.wasm
          ~/.wasmtime/bin/wasmtime run --invoke test runtime/wasm/samples/scheduler.wasm
          ~/.wasmtime/bin/wasmtime run --invoke main runtime/wasm/samples/emitted.wasm
          ~/.wasmtime/bin/wasmtime run --invoke main runtime/wasm/samples/emitted_suspend.wasm
          ~/.wasmtime/bin/wasmtime run --invoke main runtime/wasm/samples/emitted_multi.wasm

  wasm-browser:
    name: WASM exec — headless Chromium, COOP/COEP
    needs: changes
    if: ${{ needs.changes.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install toolchain (clang / ninja / WABT)
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list /etc/apt/sources.list.d/azure*.list /etc/apt/sources.list.d/azure-cli*.list 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang wabt
      - name: Build the compiler core + teko driver (Release)
        run: |
          cmake -S . -B build -G "Ninja" -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target teko_core teko --parallel 4
      - name: Emit real concurrency modules from the Teko backend
        run: |
          cc -I src runtime/wasm/emit-demo/emit_spawn_channel.c build/libteko_core.a -o emit_spawn_channel
          cc -I src runtime/wasm/emit-demo/emit_suspend.c       build/libteko_core.a -o emit_suspend
          cc -I src runtime/wasm/emit-demo/emit_multi.c         build/libteko_core.a -o emit_multi
          cc -I src runtime/wasm/emit-demo/emit_dom.c           build/libteko_core.a -o emit_dom
          cc -I src runtime/wasm/emit-demo/emit_events.c        build/libteko_core.a -o emit_events
          cc -I src runtime/wasm/emit-demo/emit_alloc.c         build/libteko_core.a -o emit_alloc
          cc -I src runtime/wasm/emit-demo/emit_richevent.c     build/libteko_core.a -o emit_richevent
          ./emit_spawn_channel runtime/wasm/samples/emitted.wat
          ./emit_suspend        runtime/wasm/samples/emitted_suspend.wat
          ./emit_multi          runtime/wasm/samples/emitted_multi.wat
          ./emit_dom            runtime/wasm/samples/emitted_dom.wat runtime/wasm/samples/emitted_dom.glue.mjs
          ./emit_events         runtime/wasm/samples/emitted_events.wat runtime/wasm/samples/emitted_events.glue.mjs
          ./emit_alloc          runtime/wasm/samples/emitted_alloc.wat runtime/wasm/samples/emitted_alloc.glue.mjs runtime/wasm/samples/emitted_alloc.mjs
          ./emit_richevent      runtime/wasm/samples/emitted_richevent.wat runtime/wasm/samples/emitted_richevent.glue.mjs
      - name: Compile REAL @dom + event-handler .tks to WASM with the teko binary
        run: |
          ./build/teko build runtime/wasm/samples/dom.tks    --target=wasm -o runtime/wasm/samples/dom.wat
          ./build/teko build runtime/wasm/samples/events.tks --target=wasm -o runtime/wasm/samples/events.wat
          ./build/teko build runtime/wasm/samples/nested.tks --target=wasm -o runtime/wasm/samples/nested.wat
      - name: Assemble all modules (wat2wasm)
        run: |
          wat2wasm runtime/wasm/samples/channels.wat        -o runtime/wasm/samples/channels.wasm
          wat2wasm runtime/wasm/samples/scheduler.wat       -o runtime/wasm/samples/scheduler.wasm
          wat2wasm runtime/wasm/samples/emitted.wat         -o runtime/wasm/samples/emitted.wasm
          wat2wasm runtime/wasm/samples/emitted_suspend.wat -o runtime/wasm/samples/emitted_suspend.wasm
          wat2wasm runtime/wasm/samples/emitted_multi.wat   -o runtime/wasm/samples/emitted_multi.wasm
          wat2wasm runtime/wasm/samples/emitted_dom.wat     -o runtime/wasm/samples/emitted_dom.wasm
          wat2wasm runtime/wasm/samples/emitted_events.wat  -o runtime/wasm/samples/emitted_events.wasm
          wat2wasm runtime/wasm/samples/emitted_alloc.wat   -o runtime/wasm/samples/emitted_alloc.wasm
          wat2wasm runtime/wasm/samples/emitted_richevent.wat -o runtime/wasm/samples/emitted_richevent.wasm
          wat2wasm runtime/wasm/samples/dom.wat               -o runtime/wasm/samples/dom.wasm
          wat2wasm runtime/wasm/samples/events.wat            -o runtime/wasm/samples/events.wasm
          wat2wasm runtime/wasm/samples/nested.wat            -o runtime/wasm/samples/nested.wasm
      - name: Install harness deps + Chromium
        working-directory: runtime/wasm
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run headless-browser harness (parity + crossOriginIsolated check)
        working-directory: runtime/wasm
        run: node run-browser.mjs
      - name: Run Browser-FFI DOM proof (Teko drives the DOM via auto-generated glue)
        working-directory: runtime/wasm
        run: node run-dom.mjs
      - name: Run @dom-from-source proof (teko-compiled dom.tks drives the DOM)
        working-directory: runtime/wasm
        run: node run-dom-source.mjs
      - name: Run event-handler-from-source proof (teko-compiled events.tks)
        working-directory: runtime/wasm
        run: node run-events-source.mjs
      - name: Run nested-@dom-args proof (teko-compiled nested.tks builds a DOM tree)
        working-directory: runtime/wasm
        run: node run-nested.mjs
      - name: Run Browser-FFI events proof (click -> Teko callback via teko_invoke)
        working-directory: runtime/wasm
        run: node run-events.mjs
      - name: Run Browser-FFI facade proof (mod.showMessage marshals JS string via alloc)
        working-directory: runtime/wasm
        run: node run-facade.mjs
      - name: Run Browser-FFI rich-event proof (typed value -> Teko via allocator)
        working-directory: runtime/wasm
        run: node run-richevent.mjs

  gate:
    name: gate
    needs: [ wasm-wasmtime, wasm-browser ]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        run: |
          echo "results: ${{ join(needs.*.result, ',') }}"
          if echo "${{ join(needs.*.result, ',') }}" | grep -qE 'failure|cancelled'; then
            echo "A required job failed."; exit 1
          fi
          echo "gate OK"
