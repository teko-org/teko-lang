name: Sanitizers & Stress

# chore/reboot is the ACTIVE integration branch (the "new main") — without it here, PRs
# targeting chore/reboot get no checks at all (issue #54).
on:
  push:
    branches: [main, master, chore/reboot]
  pull_request:
    branches: [main, master, chore/reboot]

# Restrict default token scope for all jobs in this workflow.
permissions:
  contents: read

jobs:
  # ── path filter ──────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            run:
              - 'src/**'
              - 'tests/**'
              - 'CMakeLists.txt'
              - '.github/workflows/sanitizers.yml'
              - '.github/lsan-suppressions.txt'

  # ── ASan + UBSan + LSan (default computed-goto dispatch) ────────────────────
  # LSan is enabled on THIS lane only (issue #54): detect_leaks=1 with a suppressions
  # file (.github/lsan-suppressions.txt) covering the documented M.5 process-lifetime
  # allocations (deliberately never freed by us; reclaimed by the OS at exit). Any
  # OTHER leak fails the lane. The portable-dispatch lane keeps detect_leaks=0 so a
  # suppressions gap can't double-fail the matrix.
  asan-default:
    name: ASan+UBSan+LSan / default dispatch
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build clang

      - name: Configure CMake (ASan + UBSan)
        run: |
          cmake -S . -B build-asan \
            -G "Ninja" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g"

      - name: Build teko
        run: cmake --build build-asan --target teko --parallel 4

      - name: Run tests (ASan + UBSan + LSan)
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=1
          LSAN_OPTIONS: suppressions=.github/lsan-suppressions.txt:print_suppressions=0
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ./build-asan/teko test . --coverage

      # `teko test .` exercises only the VM path — the NATIVE backend (tk_emit_c /
      # cg_lift_program / tk_emit_tsym / run_cc) never ran under ASan, which is how the
      # lift-pass use-after-free in tk_emit_tsym (freed items list read for the .tsym map;
      # crashed glibc builds of any project with a non-capturing lambda) shipped unseen.
      # Build every regressions fixture natively with the SANITIZED compiler so the whole
      # build pipeline is ASan-covered. Leak detection off: the front-end deliberately
      # holds compiler-lifetime allocations it never frees (core.h S0 seam discipline).
      - name: Native-build regressions fixtures (ASan + UBSan)
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=0
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          out="$(mktemp -d)"
          for proj in examples/regressions/*/; do
            ls "$proj"*.tkp >/dev/null 2>&1 || continue
            echo "== teko build $proj"
            ./build-asan/teko build "$proj" -o "$out/$(basename "$proj")"
          done

  # ── ASan + UBSan (portable switch dispatch) ──────────────────────────────────
  asan-portable:
    name: ASan+UBSan / portable switch dispatch
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build clang

      - name: Configure CMake (ASan + UBSan, portable dispatch)
        run: |
          cmake -S . -B build-asan-portable \
            -G "Ninja" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g" \
            -DTEKO_VM_PORTABLE_DISPATCH=ON

      - name: Build teko
        run: cmake --build build-asan-portable --target teko --parallel 4

      - name: Run tests (ASan + UBSan, portable dispatch)
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=0
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ./build-asan-portable/teko test . --coverage

  # ── TSan (Thread Sanitizer) ───────────────────────────────────────────────────
  tsan:
    name: TSan
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build clang

      - name: Configure CMake (TSan)
        run: |
          cmake -S . -B build-tsan \
            -G "Ninja" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-fsanitize=thread -fno-omit-frame-pointer -g"

      - name: Build teko
        run: cmake --build build-tsan --target teko --parallel 4

      - name: Run tests (TSan)
        env:
          TSAN_OPTIONS: halt_on_error=1
        run: ./build-tsan/teko test . --coverage

  # ── Windows stress: run tests 20 times ───────────────────────────────────────
  # NOTE: Uses Clang + Ninja (not MSVC) because the project requires __int128.
  windows-stress:
    name: Windows stress (20 runs)
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: windows-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake (Clang + Ninja)
        run: cmake -S . -B build -G "Ninja" -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Release

      - name: Build teko
        run: cmake --build build --target teko --parallel 4

      - name: Run tests 20 times
        shell: pwsh
        run: |
          for ($i = 1; $i -le 20; $i++) {
            Write-Host "=== Run $i / 20 ==="
            .\build\teko.exe test . --coverage
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Test run $i failed with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
            }
          }
          Write-Host "All 20 stress runs passed."

  # ── gate: aggregates all sanitizer + stress results ──────────────────────────
  gate:
    name: Sanitizer gate
    runs-on: ubuntu-latest
    needs: [changes, asan-default, asan-portable, tsan, windows-stress]
    if: always()
    permissions: {}

    steps:
      - name: Evaluate results
        run: |
          ASAN_DEFAULT="${{ needs.asan-default.result }}"
          ASAN_PORTABLE="${{ needs.asan-portable.result }}"
          TSAN="${{ needs.tsan.result }}"
          WINDOWS_STRESS="${{ needs.windows-stress.result }}"
          CHANGES="${{ needs.changes.outputs.run }}"

          echo "changes.run    = $CHANGES"
          echo "asan-default   = $ASAN_DEFAULT"
          echo "asan-portable  = $ASAN_PORTABLE"
          echo "tsan           = $TSAN"
          echo "windows-stress = $WINDOWS_STRESS"

          if [ "$CHANGES" != "true" ]; then
            echo "No relevant files changed — gate passes."
            exit 0
          fi

          FAILED=0
          for RESULT in "$ASAN_DEFAULT" "$ASAN_PORTABLE" "$TSAN" "$WINDOWS_STRESS"; do
            if [ "$RESULT" = "failure" ] || [ "$RESULT" = "cancelled" ]; then
              FAILED=1
            fi
          done

          if [ "$FAILED" = "1" ]; then
            echo "ERROR: one or more sanitizer/stress jobs failed or were cancelled."
            exit 1
          fi

          echo "Sanitizer gate passed."
          exit 0
