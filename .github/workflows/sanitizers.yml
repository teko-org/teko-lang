name: Sanitizers & Stress

# CI runs on PULL REQUESTS ONLY (cost: a green PR already proved main; the post-merge push
# would just re-run it). Branch protection gates merges on these checks; the release trusts
# main and does not re-validate. chore/reboot stays listed for PRs into it (#54).
on:
  pull_request:
    branches: [main, master, chore/reboot, 'remodel/**', 'fix/issue-*']
  push:
    branches: ['remodel/**']
    paths-ignore: ['**.md', 'docs/**']

# Restrict default token scope for all jobs in this workflow.
permissions:
  contents: read

# Sub-sub-PRs (a PR whose base is a `fix/issue-*` mini-umbrella) build the WHOLE corpus
# under the sanitizer — the COMPILER's own memory safety is exercised end-to-end over
# every source file — but skip RUNNING the native #test suite under it, which is the
# expensive part. That keeps the high-value guard (our hand-written arena/memory code,
# checked as the sanitized compiler compiles the corpus) while cutting the per-slice cost.
# On the umbrella/main push (empty flag) the full suite runs under the sanitizer, so any
# codegen UB in the generated C is caught before the wave ships. See the CI-perf model.
env:
  VERIFY_FLAG: ${{ (github.event_name == 'pull_request' && startsWith(github.base_ref, 'fix/issue-')) && '--no-verify' || '' }}

jobs:
  # ── path filter ──────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: shell
          filters: |
            run:
              - 'src/**'
              - 'tests/**'
              - 'examples/regressions/**'
              - 'scripts/ci_cc_wrap.sh'
              - 'scripts/ci_provision_teko.sh'
              - 'scripts/diff_c_own.sh'
              - 'scripts/check_coff.sh'
              - '.github/workflows/sanitizers.yml'
              - '.github/lsan-suppressions.txt'

      # Docs-only guard (owner ruling 2026-07-11): the src/** glob also matches Markdown
      # living inside the source tree (e.g. src/checker/capability_audit.md), so a pure-doc
      # edit would otherwise run the sanitizer lanes. Skip only when EVERY matched file is
      # *.md — any non-Markdown match forces the full run, so a real source change can never
      # be hidden from the gate. `paths-ignore` on the trigger is NOT used: the `gate` job is
      # a REQUIRED check and skipping the workflow would leave it never reported (PR hangs).
      - name: Decide (skip when the change is Markdown-only)
        id: decide
        shell: bash
        env:
          MATCHED: ${{ steps.filter.outputs.run }}
          FILES: ${{ steps.filter.outputs.run_files }}
        run: |
          if [ "$MATCHED" != "true" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No allowlisted path changed — nothing to gate."
            exit 0
          fi
          run=false
          for f in $FILES; do
            case "$f" in
              *.md) ;;                 # Markdown — does not, by itself, force a run
              *)    run=true ;;        # any non-Markdown match forces the full gate
            esac
          done
          echo "run=$run" >> "$GITHUB_OUTPUT"
          if [ "$run" = "true" ]; then
            echo "Non-Markdown changes present — running the full gate."
          else
            echo "Markdown-only change under the allowlisted paths — skipping the heavy gate."
          fi

  # ── ASan + UBSan + LSan (default computed-goto dispatch) ────────────────────
  # LSan is enabled on THIS lane only (issue #54): detect_leaks=1 with a suppressions
  # file (.github/lsan-suppressions.txt) covering the documented M.5 process-lifetime
  # allocations (deliberately never freed by us; reclaimed by the OS at exit). Any
  # OTHER leak fails the lane.
  asan-default:
    name: ASan+UBSan+LSan / default dispatch
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang

      - name: Provision teko from the latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/ci_provision_teko.sh linux-x86_64

      # The compiler is the downloaded release; sanitize its C by building gen1 (generated
      # C + runtime seam) under -fsanitize via a cc wrapper, then RUN gen1 — that is what
      # exercises the compiler's C under ASan/UBSan.
      - name: Build gen1 under ASan + UBSan (cc wrapper)
        run: |
          sh scripts/ci_cc_wrap.sh "-fsanitize=address,undefined -fno-omit-frame-pointer -g"
          teko . -o bin $VERIFY_FLAG

      # This lane runs the NATIVE gate (`./bin/teko . -o gen2-asan`): the sanitized gen1 compiles the
      # whole project through the PRODUCTION native pipeline (front-end -> emitted C -> host cc ->
      # execute), so ASan/UBSan/LSan cover the emitted C + runtime seam on the path the release ships,
      # and it drops the VM functional-env balloon under ASan. This lane is a rolling UB-audit of the
      # native path: each pre-existing UB it surfaces is fixed at the ROOT before the flip stays green.
      # It has so far surfaced and driven root fixes for (1) the #291 trait dynamic-vtable function-
      # pointer-type mismatch (typed dispatch thunks); and, once dispatch no longer aborted, two more
      # PRE-EXISTING runtime UBs the VM gate never reached, BOTH fixed at the root before this re-flip:
      # (2a) `tk_mul_u16` signed-integer-overflow (uint16 operands promote to int; 65535*65535
      # overflows) — now multiplied in `unsigned`; and (2b) a SYSTEMIC arena under-alignment —
      # `tk_region_alloc` rounded to `_Alignof(max_align_t)` (8 on arm64) but `ExprKind`/`TExprKind`
      # carry an `__int128` needing 16, so every Expr/TExpr could land 8-byte-aligned on a
      # max_align_t<16 target — now the arena guarantees TK_ARENA_ALIGN (max of max_align_t's and
      # __int128's) for the payload base AND the bump/size rounding. The #168 build-gate memory win
      # (VM→native default for `teko . -o bin`) is independent of this lane. The #323 ASan caps stay:
      # they bound the lane's ASan footprint on the 7 GB runner.
      #
      # LSan (detect_leaks) is OFF here BY CONSTRUCTION. The native gate compiles + runs the whole
      # corpus in ONE process with NO arena rewind, so process-lifetime allocations (front-end
      # discovery strings via dsc_walk, per-test crypto buffers) are held to exit by the S0 arena
      # discipline and reclaimed by the OS — LSan cannot distinguish deliberate holds from real leaks
      # on this lane (it flagged ~132 KB of legitimate holds, NONE from the alignment change). This
      # lane audits ASan + UBSan on the production native path, surfacing the UBs above (#291/#325/#326).
      - name: Run the gate on gen1 (native, ASan + UBSan)
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=0:quarantine_size_mb=64:malloc_context_size=5
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ./bin/teko . -o gen2-asan $VERIFY_FLAG

      # The native gate above already ASan-covers the whole native BUILD pipeline (tk_emit_c /
      # cg_lift_program / tk_emit_tsym / run_cc) — that heavy allocation traffic through the arena is
      # exactly what surfaced the __int128 under-alignment and the trait-vtable UB. Additionally build
      # every regressions fixture natively with the SANITIZED compiler to widen the corpus of language
      # constructs exercised under ASan — that is how the lift-pass use-after-free in tk_emit_tsym
      # (freed items list read for the .tsym map; crashed glibc builds of any project with a
      # non-capturing lambda) is caught. Leak detection off: the front-end deliberately holds
      # compiler-lifetime allocations it never frees (core.h S0).
      - name: Native-build regressions fixtures (ASan + UBSan)
        env:
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=0
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          out="$(mktemp -d)"
          for proj in examples/regressions/*/; do
            ls "$proj"*.tkp >/dev/null 2>&1 || continue
            if [ -f "${proj}EXPECT_COMPILE_FAIL" ]; then echo "== skip ${proj} (EXPECT_COMPILE_FAIL — negative fixture, nothing to sanitize)"; continue; fi
            echo "== teko build $proj"
            ./bin/teko build "$proj" -o "$out/$(basename "$proj")"
          done

  # ── TSan (Thread Sanitizer): BUILD + SMOKE ────────────────────────────────────
  # TSan runs build + smoke while the codebase is single-threaded (TSan finds no races
  # without threads; ASan+UBSan run the full suite). RESTORE the full `teko test .`
  # gate under TSan INCREMENTALLY as the concurrency surface lands — async/await,
  # routines, teko::threading::run, parallelism, channels, teko::sync (S8/ASYNC,
  # ROUND 5). Mandatory checklist item on every concurrency PR.
  #
  # Rationale (user-ratified, supersedes issue #127's full-suite-under-TSan approach):
  # the test path is 100% SINGLE-THREADED today — ZERO pthread/thread/atomic/spawn in
  # src/ (verified by grep). With no threads, TSan has no race to find: running the full
  # 614-test suite under `-fsanitize=thread` produces NO additional coverage over the
  # ASan+UBSan lanes (which DO run the full suite and pass) and only exposes the suite
  # to environmental flake — the intermittent exit-143 (silent SIGTERM) that blocked
  # unrelated PRs (#125, #126) was a RESOURCE/SLOWNESS kill on the slowest lane, never a
  # data race or deadlock (the suite completes cleanly and deterministically both locally
  # and on healthy runners). This is NOT a quarantine and loses NO real coverage: right-
  # sizing the lane to BUILD + a race-clean SMOKE keeps exactly what TSan can still
  # meaningfully assert on a single-threaded codebase, while removing the redundant,
  # flake-prone full run.
  #
  # What still runs here:
  #   1. BUILD the compiler under `-fsanitize=thread` — this catches TSan-build breakage
  #      (instrumentation/flag incompatibilities) the moment it is introduced, so the day
  #      threading lands the TSan toolchain is already known-good.
  #   2. SMOKE: use the TSan-built `teko` to BUILD one small existing regression fixture
  #      (examples/regressions/exit_success_path) and RUN the produced binary, asserting
  #      its deterministic exit code (5). This proves the runtime executes race-clean
  #      under TSan end-to-end (front-end -> C -> host cc -> execute) on a real program
  #      that does actual work (a cross-file loop + a call-through-function-value closure).
  # The #128 reliability guards are kept on the smoke run: the `timeout` wrapper makes any
  # residual stall FAIL LOUD (exit 124) at a known bound instead of a silent SIGTERM (143),
  # and the bounded TSAN_OPTIONS keep TSan correct for FUTURE threading bugs while capping
  # its footprint. Job timeout kept at 15 min as backstop.
  tsan:
    name: TSan
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang

      - name: Provision teko from the latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/ci_provision_teko.sh linux-x86_64

      - name: Build gen1 under TSan (cc wrapper)
        run: |
          sh scripts/ci_cc_wrap.sh "-fsanitize=thread -fno-omit-frame-pointer -g"
          teko . -o bin $VERIFY_FLAG

      # SMOKE (not the full suite — see the BUILD + SMOKE rationale above; RESTORE the
      # full `teko test .` gate under TSan as the concurrency surface lands). Build ONE
      # tiny race-clean fixture with the TSan-built compiler and RUN it, asserting the
      # fixture's deterministic exit code (5). `timeout` (coreutils, always on
      # ubuntu-latest) makes any stall fail loud (exit 124) at a known bound instead of a
      # silent runner SIGTERM (143); bounded TSAN_OPTIONS cap the footprint on a
      # memory-tight runner while staying correct for FUTURE threading bugs.
      - name: Smoke (TSan build+run of one regression fixture)
        env:
          # Single-threaded workload: keep TSan correct for FUTURE threading bugs, but
          # bound its footprint so a memory-tight runner flushes instead of OOM-killing.
          TSAN_OPTIONS: halt_on_error=1:history_size=2:memory_limit_mb=6000:flush_memory_ms=2000
        run: |
          set -euo pipefail
          out="$(mktemp -d)"
          proj="examples/regressions/exit_success_path"   # tiny; deterministically exits 5
          echo "== teko build $proj (TSan)"
          timeout --kill-after=30s 600s ./bin/teko build "$proj" -o "$out" | tee build.log
          bin="$(sed -n 's/.*: built //p' build.log | tail -n1)"
          if [ -z "$bin" ] || [ ! -x "$bin" ]; then
            echo "ERROR: could not locate the built binary from the TSan build output." >&2
            exit 1
          fi
          echo "== run $bin (TSan) — expecting deterministic exit code 5"
          set +e
          timeout --kill-after=30s 600s "$bin"
          code=$?
          set -e
          if [ "$code" -ne 5 ]; then
            echo "ERROR: TSan smoke run exited $code, expected 5 (race/abort/timeout/divergence)." >&2
            exit 1
          fi
          echo "TSan smoke passed: build + run race-clean, exit code 5 as expected."

  # ── Windows self-host smoke + the own==C Windows differential ────────────────
  # The ONLY per-PR lane that self-builds gen-1 on Windows (build-test only runs the
  # seed's VM gate; diff-vm-native is linux+macos; release rebuilds Windows only at
  # release time). ONE gate run on gen-1 is enough: the compiler is single-threaded and
  # deterministic, so N identical sequential runs add no coverage — the historical 20×
  # stress hunted a long-fixed intermittent hang and cost ~16 min per PR (owner ruling
  # 2026-07-04). RE-EXPAND to a real stress N× as S8 concurrency primitives land (same
  # trigger as the TSan full-suite re-expansion).
  #
  # issue #388 B3-4: after gen1 builds, this lane also runs the Windows x86_64
  # C-vs-own differential (scripts/diff_c_own.sh, host-detected via the MSYS/MINGW/
  # CYGWIN `uname` branch): each exit(n) fixture is built TWICE by gen1 — once via
  # the default C backend, once via TEKO_BACKEND=native TEKO_TARGET=x86_64-windows
  # (the B3 own AOT backend: x86 isel/regalloc under win64() -> emit_coff) — both
  # linked NATIVELY on this runner (TEKO_CC=cc, the same clang the pre-existing
  # C-backend Windows build already resolves), both RUN NATIVELY (the PE executes
  # directly on its own target OS — no emulator, unlike the riscv64-qemu lane), and
  # asserted own_exit == C_exit. check_coff.sh cross-checks the emitted .o with the
  # runner's LLVM tools. own_print_exit stays a KNOWN-STOP (the shared println
  # LIR-builtin gap, target-independent — R-4). A red differential here gates the
  # merge (main-integrity law).
  windows-selfhost:
    name: Windows self-host smoke (gen-1) + own==C differential
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: windows-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provision teko from the latest release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/ci_provision_teko.sh windows-x86_64

      - name: Build gen1 (seed compiles the PR sources — compile-only smoke)
        shell: bash
        run: teko . -o bin --no-verify

      - name: Windows x86_64 C-vs-own differential (own AOT backend == C backend, native PE execution)
        shell: bash
        env:
          TEKO: ./bin/teko
        run: ./scripts/diff_c_own.sh


  # ── gate: aggregates all sanitizer + stress results ──────────────────────────
  gate:
    name: Sanitizer gate
    runs-on: ubuntu-latest
    needs: [changes, asan-default, tsan, windows-selfhost]
    if: always()
    permissions: {}

    steps:
      - name: Evaluate results
        run: |
          ASAN_DEFAULT="${{ needs.asan-default.result }}"
          TSAN="${{ needs.tsan.result }}"
          WINDOWS_SELFHOST="${{ needs.windows-selfhost.result }}"
          CHANGES="${{ needs.changes.outputs.run }}"

          echo "changes.run    = $CHANGES"
          echo "asan-default   = $ASAN_DEFAULT"
          echo "tsan           = $TSAN"
          echo "windows-selfhost = $WINDOWS_SELFHOST"

          if [ "$CHANGES" != "true" ]; then
            echo "No relevant files changed — gate passes."
            exit 0
          fi

          FAILED=0
          for RESULT in "$ASAN_DEFAULT" "$TSAN" "$WINDOWS_SELFHOST"; do
            if [ "$RESULT" = "failure" ] || [ "$RESULT" = "cancelled" ]; then
              FAILED=1
            fi
          done

          if [ "$FAILED" = "1" ]; then
            echo "ERROR: one or more sanitizer/stress jobs failed or were cancelled."
            exit 1
          fi

          echo "Sanitizer gate passed."
          exit 0
