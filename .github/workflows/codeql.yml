name: CodeQL

# chore/reboot is the ACTIVE integration branch (the "new main") — without it here, PRs
# targeting chore/reboot get no checks at all (issue #54).
on:
  push:
    branches: [main, master, chore/reboot]
  pull_request:
    branches: [main, master, chore/reboot]

# Restrict default token scope for all jobs in this workflow.
permissions:
  contents: read

jobs:
  # ── path filter ──────────────────────────────────────────────────────────────
  # Skip analysis for changes that touch no scannable input (docs, .claude/ agent
  # config, .gitignore, memory) — mirrors native/sanitizers/sast. The code_scanning
  # ruleset rule evaluates the LAST analysis, so a skipped run keeps main's clean state.
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            run:
              - 'src/**'
              - 'CMakeLists.txt'
              - '.github/workflows/**'

  analyze:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c-cpp
            build-mode: manual
          - language: actions
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies (c-cpp only)
        if: matrix.language == 'c-cpp'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build clang

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build (c-cpp)
        if: matrix.language == 'c-cpp'
        run: |
          cmake -S . -B build \
            -G "Ninja" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_BUILD_TYPE=Debug
          cmake --build build --target teko --parallel 4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
