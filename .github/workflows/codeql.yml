name: CodeQL

# chore/reboot is the ACTIVE integration branch (the "new main") — without it here, PRs
# targeting chore/reboot get no checks at all (issue #54).
on:
  push:
    branches: [main, master, chore/reboot]
  pull_request:
    branches: [main, master, chore/reboot]

# Restrict default token scope for all jobs in this workflow.
permissions:
  contents: read

jobs:
  # CodeQL is NOT path-gated. It feeds the `code_scanning` ruleset rule, which requires
  # a completed analysis for the PR head — gating it (skipping on docs/config-only PRs)
  # leaves the PR BLOCKED "waiting for CodeQL". So CodeQL runs on every PR; the expensive
  # multi-platform build/test lanes (native/sanitizers/sast) stay path-gated instead.
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c-cpp
            build-mode: manual
          - language: actions
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang (c-cpp only)
        if: matrix.language == 'c-cpp'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Teko-only: the compiler is the released binary and its C twins are FROZEN. CodeQL
      # scans the LIVE maintained C — the runtime seam + assert seed linked into every
      # generated program. A minimal cc (no cmake / compiler C build) is what it traces.
      - name: Build (c-cpp — live runtime only)
        if: matrix.language == 'c-cpp'
        run: |
          clang -c -std=c23 -Isrc/runtime -Isrc/assert \
            src/runtime/teko_rt.c src/assert/assert.c -o /dev/null

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
