name: Native Build & Test

# CI runs on PULL REQUESTS (the per-PR gate) plus PUSHES to remodel/** integration branches.
# Branch protection requires the PR checks green before a PR can merge, so every commit that
# reaches main was already 100% green — re-running the full suite on the post-merge push would
# only duplicate that work and burn pipeline minutes. The release trusts this and builds from a
# main tag WITHOUT re-validating (see release.yml). chore/reboot stays listed so PRs targeting the
# integration branch still get checks (#54). The nightly VM-regression SCHEDULE trigger is retired
# with the VM CI lane itself (issue #524) — native is now the sole engine, gated on every PR.
on:
  pull_request:
    branches: '*'
    paths: ['**.tkp', '**.tks', '**.tkp', '**.sh', '**.c', '**.h', '.github/workflows/*.yml']

# Restrict default token scope for all jobs in this workflow.
permissions:
  contents: read

jobs:
  # ── path filter ──────────────────────────────────────────────────────────────
  # PR-only: the paths-filter needs a pull_request context, so this job — and every
  # job that `needs: changes` — only runs on pull_request events.
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: shell
          filters: |
            run:
              - 'src/**'
              - 'tests/**'
              - 'examples/**'
              - 'scripts/**'
              - '.github/workflows/native.yml'

      # Docs-only guard (owner ruling 2026-07-11): the allowlist globs (src/**, tests/**, …)
      # also match Markdown that lives INSIDE those trees (e.g. src/checker/capability_audit.md),
      # so a pure-documentation edit would otherwise trigger the whole heavy gate. Skip only when
      # EVERY matched file is *.md — any single non-Markdown match still forces the full run, so
      # this can never hide a real source change from the gate (fail-safe: it can under-skip, never
      # over-skip). A trigger-level `paths-ignore` is deliberately NOT used here: the `gate` job is
      # a REQUIRED status check, and skipping the whole workflow would leave it never reported →
      # the PR would hang "waiting for CI gate". The always-running gate + this filter is the fix.
      - name: Decide (skip when the change is Markdown-only)
        id: decide
        shell: bash
        env:
          MATCHED: ${{ steps.filter.outputs.run }}
          FILES: ${{ steps.filter.outputs.run_files }}
        run: |
          if [ "$MATCHED" != "true" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No allowlisted path changed — nothing to gate."
            exit 0
          fi
          run=false
          for f in $FILES; do
            case "$f" in
              *.md) ;;                 # Markdown — does not, by itself, force a run
              *)    run=true ;;        # any non-Markdown match forces the full gate
            esac
          done
          echo "run=$run" >> "$GITHUB_OUTPUT"
          if [ "$run" = "true" ]; then
            echo "Non-Markdown changes present — running the full gate."
          else
            echo "Markdown-only change under the allowlisted paths — skipping the heavy gate."
          fi

  # ── matrix: Linux x86_64 + arm64, macOS arm64, Windows x86_64 + arm64 ──────
  # NOTE: Windows uses Clang (not MSVC) because the project requires __int128 and
  # other GCC/Clang extensions that MSVC does not support.
  build-test:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            full_gate: true
          - os: ubuntu-24.04-arm
            label: linux-arm64
          - os: macos-latest
            label: macos-arm64
          - os: windows-latest
            label: windows-x86_64
          # DISABLED (owner ruling 2026-07-06, compile-time): windows-arm64 was the CI
          # critical path. Commented out as a FUTURE-SUPPORT pendency — re-enable once the
          # native gate is fast (#168/#265) and a faster arm64 Windows runner is available.
          # Tracking: #304.
          # - os: windows-11-arm
          #   label: windows-arm64

    name: build-test / ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The compiler is no longer built from the C bootstrap — it is the previously
      # RELEASED teko binary (Teko-only ruling). CI provisions it by downloading the
      # latest release's per-platform asset, then runs the PR corpus through it.
      - name: Provision teko from the latest release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL: ${{ matrix.label }}
        run: ./scripts/ci_provision_teko.sh "$LABEL"

      # The self-build gate is NATIVE (#168 memory-debt fix): `teko . -o bin` compiles the #test
      # corpus to a binary, runs it in a CHILD process (a failed assert → non-zero exit bars this
      # step), and enforces ALL THREE coverage floors (function/line/branch, #265 Track A) from
      # the native run's merged marks. Because tests run out-of-process, the compiler's peak stays
      # codegen-only (~940 MB). This is ONE gate per platform; native is the sole engine (VM
      # retired, issue #524).
      - name: Test gate (native on the primary; compile-only elsewhere — perf)
        shell: bash
        run: teko . -o bin --no-verify --release

      # fmt gate REMOVED (owner ruling 2026-07-08): `teko fmt` is a DEV tool for canonical
      # formatting, NOT a gate to bar code. The current fmt collapses hand-alignment, so it
      # fights the W15 vertical-alignment target (deferred to #372) and blocked the 0.3 wave on
      # pure formatting. Formatting stays covered by running `teko fmt` + the per-wave W15
      # retrofit. Re-add a `fmt --check` gate only once #372 makes fmt align properly.

  # ── RISC-V own==C differential under QEMU (BLOCKING — gated in the CI gate job) ─
  riscv64-qemu:
    needs: changes
    # RE-ENABLED + RE-SCOPED (issue #387 B2-8): the OLD lane ran the FULL `test . --coverage`
    # under qemu user-mode (~8-9m, 85% emulated EXECUTION), so it was disabled (#305). B2-8
    # replaces that with the FAST tiny exit(n) C-vs-own differential (seconds, not minutes):
    # build gen1 (the PR compiler under test, which now carries the own riscv64 AOT backend),
    # then run scripts/diff_c_own.sh in riscv mode — each exit(n) fixture built BOTH via the
    # C backend cross-compiled for riscv AND via the own riscv pipeline (TEKO_TARGET=riscv64-linux),
    # both cross-linked by riscv64-linux-gnu-gcc, both RUN under qemu-riscv64-static, asserting
    # own_exit == C_exit. This proves own==C on riscv end-to-end without the full emulated gate.
    if: needs.changes.outputs.run == 'true'
    name: build-test / linux-riscv64 (qemu own==C differential)
    runs-on: ubuntu-latest
    continue-on-error: false
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross-compiler + QEMU + host clang
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-riscv64-linux-gnu qemu-user-static clang

      # riscv has no release binary asset, so it can't download a seed like the other
      # platforms. Seed the x86_64 released binary; it builds gen1 (the PR compiler under
      # test) from THIS branch's src/, so gen1 carries the own riscv64 AOT backend
      # (emit_native_riscv) — the C bootstrap / a cmake build from the frozen twins would
      # NOT. The differential runs gen1, never the raw seed.
      - name: Provision teko (x86_64 released seed)
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/ci_provision_teko.sh linux-x86_64

      - name: Build gen1 (the PR compiler under test — carries emit_native_riscv)
        run: teko . -o bin --no-verify --release

      # The fast riscv own==C differential: TEKO_DIFF_TARGET=riscv64-linux selects the riscv
      # lane in diff_c_own.sh (NOT uname — this host is x86_64). Per exit(n) fixture it builds
      # the C-riscv binary (C backend + TEKO_CC=riscv64-linux-gnu-gcc) and the own-riscv binary
      # (TEKO_BACKEND=native TEKO_TARGET=riscv64-linux + cross-gcc-as-linker), runs BOTH under
      # qemu-riscv64-static, and asserts identical exit code + stdout, plus check_elf.sh (riscv
      # binutils) well-formedness on the own .o. own_print_exit stays a KNOWN-STOP (the shared
      # println LIR-builtin gap, target-independent).
      - name: RISC-V C-vs-own differential under QEMU (own AOT backend == C backend, on gen1)
        shell: bash
        env:
          TEKO: ./bin/teko
          TEKO_DIFF_TARGET: riscv64-linux
        run: ./scripts/diff_c_own.sh

  # ── gen1 checks: CLI surface and the own==C differential (issue #524) ──
  # Builds gen1 (the PR's compiler under test) from the downloaded release seed, then runs
  # CLI-surface smokes + the CWD-build-regression check (#64) + the own AOT backend == C
  # backend differential. Test EXECUTION (`teko test .`) was moved to the isolated
  # tests.yml (owner design 2026-07-15 — one test runner per OS, in parallel with these
  # diagnostics), so it is NO LONGER run here. The own==C differential is the replacement
  # cross-check for the retired VM==native harness (issue #524): the VM shared the
  # front-end with native but not codegen, so it protected little there while its
  # wrapper-descent bug (VM-only) cost real false-failures — see
  # docs/design/vm-retirement.md §3. The linux-x86_64 leg additionally runs the wasm
  # differential (issue #389 C1-8c, the keystone ritual point): own-wasm(wasmtime) ==
  # C-native over scripts/validate_wasm_own.sh's corpus, REQUIRED (not honest-skipped —
  # both engines are provisioned in this job, so their absence is a real failure).
  gen1-checks:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            install_deps: |
              sudo apt-get update -y
              sudo apt-get install -y clang
          - os: macos-latest
            label: macos-arm64
            install_deps: ""

    # Budget kept at 45 min (issue #524 crumb 2). With the heavy `teko test .` self-test now
    # moved OUT to tests.yml (owner design 2026-07-15), this job only builds gen1 once and runs
    # the lighter CLI-surface smokes + own==C differential, so it comfortably fits the cap — the
    # generous budget is retained as headroom for the single "Build gen1" native pass on the
    # slower shared ubuntu-latest runner.
    name: gen1 checks / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The own==C differential compiles the GENERATED C (+ the runtime seam
      # teko_rt.c) with the host cc — so cc is still needed; the COMPILER itself is
      # the downloaded release, not a from-source build.
      - name: Install cc
        if: matrix.install_deps != ''
        run: ${{ matrix.install_deps }}

      - name: Provision teko from the latest release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL: ${{ matrix.label }}
        run: ./scripts/ci_provision_teko.sh "$LABEL"

      # NOTE: no CLI-flags/version check on the SEED — the seed is the PREVIOUS release,
      # so its --version is intentionally one build behind the PR's teko.tkp. The version
      # string is validated on gen1 below (built from the PR sources → matches teko.tkp).
      #
      # The seed builds the PR's compiler sources → bin/teko (= gen1, the compiler
      # UNDER TEST). Everything below validates gen1, NOT the raw seed — so a codegen
      # fix in this PR is actually exercised (a raw-seed diff would test the old release).
      - name: Build gen1 (released seed compiles the PR corpus → bin/teko)
        shell: bash
        run: teko . -o bin --no-verify --release

      # NOTE (owner design 2026-07-15): the "gen1 self-test" step (`./bin/teko test .`) was
      # MOVED OUT of this job into the isolated .github/workflows/tests.yml, which runs the
      # suite once per OS (1 linux, 1 macOS, 1 windows) in PARALLEL with these diagnostics —
      # "assim não precisa rodar testes nestes outros diagnósticos para nenhum SO ou Arch."
      # This job now builds gen1 and validates the CLI surface + the own==C differential ONLY;
      # test EXECUTION lives entirely in tests.yml.

      - name: CLI flags on gen1 (identical version string)
        shell: bash
        run: ./scripts/cli_flags_test.sh ./bin/teko

      - name: fmt CLI (--check + stdin mode) on gen1 (issue #229)
        shell: bash
        run: ./scripts/fmt_cli_test.sh ./bin/teko

      - name: tk_region_drop_subtree unit test (issue #337 — the adopt bulk-drop primitive)
        shell: bash
        run: ./scripts/region_drop_subtree_test.sh

      # CWD-build-regression check (issue #64): `cd <project> && teko build .` — the exact
      # invocation shape a real user takes — must exit 0 and produce a working binary, for
      # both the seed compiler and the self-hosted gen1 binary it just built.
      - name: CWD build regression check (issue #64, on gen1)
        shell: bash
        env:
          TEKO: ./bin/teko
        run: ./scripts/native_regressions.sh

      # EXPECT_COMPILE_FAIL assertion (issue #610, on gen1): ~30 negative regression
      # fixtures under examples/regressions/ carry an EXPECT_COMPILE_FAIL marker but no CI
      # leg ever built them and asserted the build actually fails — sanitizers.yml only
      # SKIPS them, and the VM-era scripts/diff_vm_native.sh that once asserted this was
      # retired with the VM lane (#524/#395). This step closes that gap on gen1 (the
      # compiler under test).
      - name: EXPECT_COMPILE_FAIL regression check (issue #610, on gen1)
        shell: bash
        env:
          TEKO: ./bin/teko
        run: ./scripts/compile_fail_regressions.sh

      # EXPECT_EXIT positive const regression (issue #594 crumb 8f, on gen1): the positive
      # counterpart of the check above — ~9 const fixtures under examples/regressions/
      # (const_scalar_inline, member_const_scalar, …) carry an EXPECT_EXIT marker but no CI
      # leg ever built and ran them (scripts/native_regressions.sh only smokes char_ops). A
      # fundamental const-resolution bug (collect_with_seed) was caught only by a unit test —
      # this step builds + runs every single-project EXPECT_EXIT fixture on gen1 (the
      # compiler under test), asserting the produced binary's exit code, before any seed
      # bump can ship a const regression unnoticed.
      - name: EXPECT_EXIT positive const regression check (issue #594 crumb 8f, on gen1)
        shell: bash
        env:
          TEKO: ./bin/teko
        run: ./scripts/positive_regressions.sh

      # E2E cross-module const regression (issue #594 crumb 8d, on gen1): the
      # serialize -> .tkl -> deserialize -> seed_from_dep -> inline_consts -> lower -> run
      # capability (#594 crumb 8) was previously proven only by in-memory checker unit
      # tests. This step builds the real dep/consumer PAIR under examples/regressions/
      # (a fixture the generic build-all loops skip by construction — no top-level .tkp),
      # provisioning packages/ in a scratch copy for BOTH the seed and self-hosted
      # compilers, closing the harness gap named in the #594 crumb-8 review.
      - name: E2E cross-module const regression check (issue #594 crumb 8d, on gen1)
        shell: bash
        env:
          TEKO: ./bin/teko
        run: ./scripts/crossmodule_regressions.sh

      # ── C-vs-own differential (issue #385 A4-5 arm64; issue #386 B1-8 x86-64) ──
      # The own AOT backend (TEKO_BACKEND=native) links a real native executable via cc.
      # This gate builds each exit(n) fixture with BOTH backends on gen1 (which carries
      # emit_native, built from the PR sources) and asserts own-native exit == C-native
      # exit, plus a host-tool well-formedness check on the real emitted .o. TWO executing
      # lanes, host-selected: macOS-arm64 emits arm64 Mach-O (check_macho); linux-x86_64
      # emits x86-64 ELF via TEKO_TARGET=x86_64-elf (check_elf) and RUNS the ELF — the
      # executing x86 differential the macOS lane cannot host. Other hosts honest-skip.
      - name: C-vs-own differential (own AOT backend == C backend, on gen1)
        shell: bash
        env:
          TEKO: ./bin/teko
        run: ./scripts/diff_c_own.sh

      # ── wasm differential (issue #389 C1-8c — THE KEYSTONE RITUAL POINT) ──
      # Provisions wasmtime (pinned official release tarball, the SAME pinned-download
      # shape as release-cross-smoke's zig step below) and WABT's `wasm-validate` (apt,
      # pinned to the runner image's resolved package build), then runs the full
      # own-wasm(wasmtime) == C-native differential (scripts/validate_wasm_own.sh) on
      # gen1 (which carries emit_native_wasm, C1-5/6/7). Linux-x86_64 only: the wasmtime
      # asset below and `apt-get install` are both linux-x86_64-shaped, and provisioning a
      # second engine pair for macOS-arm64 is out of this crumb's scope (named blocker B-1,
      # backend-wasm.md §14.2) — that lane's own host-specific gates already honest-skip
      # the same way in the C-vs-own differential step above.
      - name: Install wasmtime (official pinned tarball)
        if: matrix.label == 'linux-x86_64'
        env:
          WASMTIME_VERSION: "46.0.1"
        run: |
          set -eu
          curl -fsSL "https://github.com/bytecodealliance/wasmtime/releases/download/v${WASMTIME_VERSION}/wasmtime-v${WASMTIME_VERSION}-x86_64-linux.tar.xz" | tar -xJ
          echo "$PWD/wasmtime-v${WASMTIME_VERSION}-x86_64-linux" >> "$GITHUB_PATH"

      - name: Install wabt (WABT, apt, pinned)
        if: matrix.label == 'linux-x86_64'
        env:
          WABT_APT_VERSION: "1.0.34+dsfg2+~cs1.0.32-1ubuntu2"
        run: |
          set -eu
          sudo apt-get update -y
          sudo apt-get install -y "wabt=${WABT_APT_VERSION}"

      # Fail-closed, not skip-closed (issue #389 B-1): a broken/no-op provisioning step
      # (PATH not exported, wrong arch asset, apt pin drift) must break THIS step, before
      # validate_wasm_own.sh ever gets a chance to (mis)report a pass.
      - name: Assert wasm engines are actually on PATH
        if: matrix.label == 'linux-x86_64'
        run: |
          set -eu
          command -v wasmtime
          command -v wasm-validate
          wasmtime --version
          wasm-validate --version

      # REQUIRE_WASM_ENGINE=1 (validate_wasm_own.sh) turns the dev-laptop honest-skip into
      # a hard failure: CI provisioned both engines above, so an absent/broken engine here
      # is a real regression, never a silently-green skip — the keystone's whole point.
      - name: wasm differential (own-wasm(wasmtime) == C-native, on gen1 — issue #389 keystone)
        if: matrix.label == 'linux-x86_64'
        shell: bash
        env:
          TEKO: ./bin/teko
          REQUIRE_WASM_ENGINE: "1"
        run: ./scripts/validate_wasm_own.sh

  # ── release cross-compile smoke: the EXACT zig-cross the release runs, compile-only ──
  # release.yml is tag-triggered, so its Linux cross-compile went unvalidated in PR CI — a
  # zig-version/target break (e.g. 0.13.0's incomplete riscv64 glibc, missing stubs-lp64d.h)
  # only surfaced AFTER merge, on a real tag. This job runs the SAME
  # scripts/cross_compile_linux.sh in SMOKE mode on every PR: emit teko.c, cross-compile all six
  # Linux targets, assert each architecture, THEN run the x86_64-glibc artifact (native to this
  # runner, no qemu) over the corpus. A clean cross-compile is not a clean cross-run — `zig cc`
  # at an optimizing level once turned latent UB in teko.c into a checker miscompile that a
  # compile-only smoke could never see (fix/readdir-order-determinism). A break here gates the
  # merge, so a broken release can never reach main.
  release-cross-smoke:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    name: release cross-compile smoke (zig)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ZIG_VERSION: "0.16.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zig (official tarball)
        run: |
          set -eu
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" | tar -xJ
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Provision x86_64 seed
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/ci_provision_teko.sh linux-x86_64-glibc

      - name: Emit teko.c (one gen, no gate)
        run: teko . -o out --no-verify --release

      # NOTE: a `zig cc -fsyntax-only -Werror=sometimes-uninitialized` guard was tried here but
      # zig's clang is stricter than Apple clang and still flags residual value-match temps the
      # `= {0}` codegen fix (#283) doesn't fully cover — a `-Werror` guard is not satisfiable yet.
      # The real regression protection is the cross-RUN step below: a miscompiled artifact rejects
      # the corpus (non-zero exit) and gates the merge. Re-add the syntax guard once the residual
      # x86_64 UB (still open on #283) is fixed and the emitted C is `-Werror`-clean under zig.
      - name: Cross-compile all six Linux targets (compile-only, no qemu)
        run: sh scripts/cross_compile_linux.sh out/teko.c src /tmp/smoke smoke

      # A clean cross-COMPILE is not a clean cross-RUN: `zig cc` at an optimizing level once
      # miscompiled latent UB in the emitted teko.c into a checker that rejected the compiler's
      # own valid source (fix/readdir-order-determinism). The x86_64-glibc artifact is native to
      # this x86_64 runner, so RUN it — no qemu — over the corpus. A miscompiled binary rejects
      # the corpus (non-zero exit) and gates the merge; this is the regression that would have
      # caught the O2 miscompile before it ever reached a release.
      - name: Run the x86_64-glibc cross artifact over the corpus (miscompile guard)
        run: ./gd-linux-x86_64-glibc/teko . -o /tmp/xrun --no-verify --release

  # ── gate: aggregates all build-test + riscv + gen1-checks + cross-smoke results ──
  gate:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [changes, build-test, riscv64-qemu, gen1-checks, release-cross-smoke]
    if: always()
    permissions: {}

    steps:
      - name: Evaluate results
        run: |
          BUILD_RESULT="${{ needs.build-test.result }}"
          RISCV_RESULT="${{ needs.riscv64-qemu.result }}"
          GEN1_RESULT="${{ needs.gen1-checks.result }}"
          SMOKE_RESULT="${{ needs.release-cross-smoke.result }}"
          CHANGES="${{ needs.changes.outputs.run }}"

          echo "changes.run   = $CHANGES"
          echo "build-test    = $BUILD_RESULT"
          echo "riscv64-qemu  = $RISCV_RESULT"
          echo "gen1-checks   = $GEN1_RESULT"
          echo "release-cross-smoke = $SMOKE_RESULT"

          # If the paths filter said nothing relevant changed, everything skipped → OK
          if [ "$CHANGES" != "true" ]; then
            echo "No relevant files changed — gate passes."
            exit 0
          fi

          # build-test must be success (not failure, not cancelled)
          if [ "$BUILD_RESULT" = "failure" ] || [ "$BUILD_RESULT" = "cancelled" ]; then
            echo "ERROR: build-test $BUILD_RESULT"
            exit 1
          fi

          # gen1-checks must be success — gen1's own gate, CLI surface, the CWD-build
          # regression check (#64), and the own==C differential are all folded into this
          # job; any failure there gates the merge.
          if [ "$GEN1_RESULT" = "failure" ] || [ "$GEN1_RESULT" = "cancelled" ]; then
            echo "ERROR: gen1-checks $GEN1_RESULT"
            exit 1
          fi

          # riscv64-qemu is BLOCKING (main-integrity law: green means green everywhere).
          # It seeds from the released x86_64 binary, builds gen1 (the PR compiler carrying
          # the own riscv64 AOT backend), and runs the exit(n) own==C differential under
          # qemu-riscv64-static (issue #387 B2-8), so a failure is a real regression, not
          # infra noise — a red riscv gates the merge and, downstream, the release.
          if [ "$RISCV_RESULT" = "failure" ] || [ "$RISCV_RESULT" = "cancelled" ]; then
            echo "ERROR: riscv64-qemu $RISCV_RESULT"
            exit 1
          fi

          # release-cross-smoke must be success — a broken release cross-compile (zig version /
          # target / runtime portability) gates the merge so it never reaches a real tag.
          if [ "$SMOKE_RESULT" = "failure" ] || [ "$SMOKE_RESULT" = "cancelled" ]; then
            echo "ERROR: release-cross-smoke $SMOKE_RESULT"
            exit 1
          fi

          echo "Gate passed."
          exit 0
