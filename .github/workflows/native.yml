name: Native Build & Test

# CI runs on PULL REQUESTS ONLY. Branch protection requires these checks green before a PR
# can merge, so every commit that reaches main was already 100% green — re-running the full
# suite on the post-merge push would only duplicate that work and burn pipeline minutes. The
# release trusts this and builds from a main tag WITHOUT re-validating (see release.yml).
# chore/reboot stays listed so PRs targeting the integration branch still get checks (#54).
on:
  pull_request:
    branches: [main, master, chore/reboot]

# Restrict default token scope for all jobs in this workflow.
permissions:
  contents: read

jobs:
  # ── path filter ──────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            run:
              - 'src/**'
              - 'tests/**'
              - 'examples/**'
              - 'scripts/**'
              - 'CMakeLists.txt'
              - '.github/workflows/native.yml'

  # ── matrix: Linux x86_64 + arm64, macOS arm64, Windows x86_64 + arm64 ──────
  # NOTE: Windows uses Clang (not MSVC) because the project requires __int128 and
  # other GCC/Clang extensions that MSVC does not support.
  build-test:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-arm64
          - os: macos-latest
            label: macos-arm64
          - os: windows-latest
            label: windows-x86_64
          - os: windows-11-arm
            label: windows-arm64

    name: build-test / ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The compiler is no longer built from the C bootstrap — it is the previously
      # RELEASED teko binary (Teko-only ruling). CI provisions it by downloading the
      # latest release's per-platform asset, then runs the PR corpus through it.
      - name: Provision teko from the latest release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL: ${{ matrix.label }}
        run: ./scripts/ci_provision_teko.sh "$LABEL"

      # The self-build gate stays VM (the DEFAULT — unchanged cost/floors; owner ruling 2026-07-05:
      # the native gate regresses build time until #168's partitioning, so it is NOT the default).
      - name: Test gate (VM)
        shell: bash
        run: teko . -o bin

      # (#265, opt-in) The native test gate: `teko . -o gen1-native --native-gate` emits the #test
      # corpus to a binary, runs it (a failed assert → non-zero exit bars this step), and enforces
      # the FUNCTION coverage floor from the native run's merged marks. This lane exercises the
      # native codegen paths a `#test` corpus exercises for the FIRST time (cc-compiling constructs
      # the VM interpreter tolerated) — it caught 3 latent native miscompiles pre-merge. Perf win
      # (replacing this VM gate as the default) is deferred to #168's partitioning.
      - name: Native test gate (opt-in — correctness lane)
        shell: bash
        run: teko . -o gen1-native --native-gate

      # fmt gate (issue #229) — DISABLED FOR NOW. `teko` here is the previously RELEASED
      # binary (see the provision step above); `teko fmt --check .` requires the seed to be a
      # release that already contains the `fmt --check`/`fmt -` CLI this PR ships, so the gate
      # can only turn on starting with the PR that lands AFTER the release carrying this change.
      # The corpus is already reformatted to fmt's canonical shape (this PR's own commit) — the
      # integrator uncomments this step once that release exists.
      # - name: fmt gate — the corpus must already be canonical (issue #229)
      #   shell: bash
      #   run: teko fmt --check .

  # ── RISC-V cross-compile + QEMU (BLOCKING — gated in the CI gate job) ─────────
  riscv64-qemu:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    name: build-test / linux-riscv64 (qemu)
    runs-on: ubuntu-latest
    continue-on-error: false
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross-compiler + QEMU + host clang
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-riscv64-linux-gnu qemu-user-static clang

      # riscv has no release binary asset, so it can't download a seed like the other
      # platforms. But it MUST NOT cmake-build from the frozen C twins — those are frozen
      # historical code (no-mirroring ruling) and diverge from the live `.tks` (e.g. they
      # lack the #263 enum-vs-PrimKind fix), so a cmake build tests a STALE compiler and
      # fails on current sources (LIR's `F32` LType tripped exactly that). Instead: seed
      # the x86_64 released binary, have it EMIT the CURRENT compiler's C (gen-1), and
      # cross-compile THAT for riscv — testing the same compiler the other platforms run.
      - name: Provision teko (x86_64 released seed)
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/ci_provision_teko.sh linux-x86_64

      - name: Emit the current compiler's C (gen-1, gate skipped here)
        run: teko . -o gen1 --no-verify

      - name: Cross-compile gen-1's teko.c for riscv64 (static)
        run: |
          riscv64-linux-gnu-gcc -std=c2x -w -static -Isrc/runtime -Isrc/assert \
            gen1/teko.c src/runtime/teko_rt.c src/assert/assert.c -lm -o teko-riscv

      - name: Run the gate under QEMU user-mode
        run: qemu-riscv64-static ./teko-riscv test . --coverage

  # ── differential VM==native harness (issue #54) ──────────────────────────────
  # Cross-runs every examples/regressions/* project through BOTH engines (`teko run`
  # on the VM, `teko build` through the host cc + execute) and asserts identical exit
  # codes and program stdout. This is the structural gate the audit divergences
  # (#47/#48/#49/#50, the destructor gap) slipped past: `teko test .` only exercises
  # the .tkt corpus and never feeds examples/regressions/* to a real cc.
  diff-vm-native:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            install_deps: |
              sudo apt-get update -y
              sudo apt-get install -y clang
          - os: macos-latest
            label: macos-arm64
            install_deps: ""

    name: diff VM==native / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The native side of the harness compiles the GENERATED C (+ the runtime seam
      # teko_rt.c) with the host cc — so cc is still needed; the COMPILER itself is
      # the downloaded release, not a from-source build.
      - name: Install cc
        if: matrix.install_deps != ''
        run: ${{ matrix.install_deps }}

      - name: Provision teko from the latest release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL: ${{ matrix.label }}
        run: ./scripts/ci_provision_teko.sh "$LABEL"

      # NOTE: no CLI-flags/version check on the SEED — the seed is the PREVIOUS release,
      # so its --version is intentionally one build behind the PR's teko.tkp. The version
      # string is validated on gen1 below (built from the PR sources → matches teko.tkp).
      #
      # The seed builds the PR's compiler sources → bin/teko (= gen1, the compiler
      # UNDER TEST). Everything below validates gen1, NOT the raw seed — so a codegen
      # fix in this PR is actually exercised (a raw-seed diff would test the old release).
      - name: Build gen1 (released seed compiles the PR corpus → bin/teko)
        shell: bash
        run: teko . -o bin

      - name: gen1 self-test (the PR's compiler runs its own gate)
        shell: bash
        run: ./bin/teko test .

      - name: CLI flags on gen1 (identical version string)
        shell: bash
        run: ./scripts/cli_flags_test.sh ./bin/teko

      - name: fmt CLI (--check + stdin mode) on gen1 (issue #229)
        shell: bash
        run: ./scripts/fmt_cli_test.sh ./bin/teko

      - name: Differential harness (VM == native over examples/regressions, on gen1)
        shell: bash
        env:
          TEKO: ./bin/teko
        run: ./scripts/diff_vm_native.sh

  # ── release cross-compile smoke: the EXACT zig-cross the release runs, compile-only ──
  # release.yml is tag-triggered, so its Linux cross-compile went unvalidated in PR CI — a
  # zig-version/target break (e.g. 0.13.0's incomplete riscv64 glibc, missing stubs-lp64d.h)
  # only surfaced AFTER merge, on a real tag. This job runs the SAME
  # scripts/cross_compile_linux.sh in SMOKE mode on every PR: emit teko.c, cross-compile all six
  # Linux targets, assert each architecture, THEN run the x86_64-glibc artifact (native to this
  # runner, no qemu) over the corpus. A clean cross-compile is not a clean cross-run — `zig cc`
  # at an optimizing level once turned latent UB in teko.c into a checker miscompile that a
  # compile-only smoke could never see (fix/readdir-order-determinism). A break here gates the
  # merge, so a broken release can never reach main.
  release-cross-smoke:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    name: release cross-compile smoke (zig)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ZIG_VERSION: "0.16.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zig (official tarball)
        run: |
          set -eu
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" | tar -xJ
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Provision x86_64 seed
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/ci_provision_teko.sh linux-x86_64-glibc

      - name: Emit teko.c (one gen, no gate)
        run: teko . -o out --no-verify

      - name: Cross-compile all six Linux targets (compile-only, no qemu)
        run: sh scripts/cross_compile_linux.sh out/teko.c src /tmp/smoke smoke

      # A clean cross-COMPILE is not a clean cross-RUN: `zig cc` at an optimizing level once
      # miscompiled latent UB in the emitted teko.c into a checker that rejected the compiler's
      # own valid source (fix/readdir-order-determinism). The x86_64-glibc artifact is native to
      # this x86_64 runner, so RUN it — no qemu — over the corpus. A miscompiled binary rejects
      # the corpus (non-zero exit) and gates the merge; this is the regression that would have
      # caught the O2 miscompile before it ever reached a release.
      - name: Run the x86_64-glibc cross artifact over the corpus (miscompile guard)
        run: ./gd-linux-x86_64-glibc/teko . -o /tmp/xrun --no-verify

  # ── gate: aggregates all build-test + riscv + differential + cross-smoke results ──
  gate:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [changes, build-test, riscv64-qemu, diff-vm-native, release-cross-smoke]
    if: always()
    permissions: {}

    steps:
      - name: Evaluate results
        run: |
          BUILD_RESULT="${{ needs.build-test.result }}"
          RISCV_RESULT="${{ needs.riscv64-qemu.result }}"
          DIFF_RESULT="${{ needs.diff-vm-native.result }}"
          SMOKE_RESULT="${{ needs.release-cross-smoke.result }}"
          CHANGES="${{ needs.changes.outputs.run }}"

          echo "changes.run   = $CHANGES"
          echo "build-test    = $BUILD_RESULT"
          echo "riscv64-qemu  = $RISCV_RESULT"
          echo "diff-vm-native = $DIFF_RESULT"
          echo "release-cross-smoke = $SMOKE_RESULT"

          # If the paths filter said nothing relevant changed, everything skipped → OK
          if [ "$CHANGES" != "true" ]; then
            echo "No relevant files changed — gate passes."
            exit 0
          fi

          # build-test must be success (not failure, not cancelled)
          if [ "$BUILD_RESULT" = "failure" ] || [ "$BUILD_RESULT" = "cancelled" ]; then
            echo "ERROR: build-test $BUILD_RESULT"
            exit 1
          fi

          # diff-vm-native must be success — a divergence between the engines gates
          if [ "$DIFF_RESULT" = "failure" ] || [ "$DIFF_RESULT" = "cancelled" ]; then
            echo "ERROR: diff-vm-native $DIFF_RESULT"
            exit 1
          fi

          # riscv64-qemu is BLOCKING (main-integrity law: green means green everywhere).
          # It seeds from the released x86_64 binary and cross-compiles the current
          # compiler's emitted C (issue #276), so a failure is a real regression, not
          # infra noise — a red riscv gates the merge and, downstream, the release.
          if [ "$RISCV_RESULT" = "failure" ] || [ "$RISCV_RESULT" = "cancelled" ]; then
            echo "ERROR: riscv64-qemu $RISCV_RESULT"
            exit 1
          fi

          # release-cross-smoke must be success — a broken release cross-compile (zig version /
          # target / runtime portability) gates the merge so it never reaches a real tag.
          if [ "$SMOKE_RESULT" = "failure" ] || [ "$SMOKE_RESULT" = "cancelled" ]; then
            echo "ERROR: release-cross-smoke $SMOKE_RESULT"
            exit 1
          fi

          echo "Gate passed."
          exit 0
