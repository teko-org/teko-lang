name: SAST Gate

# CI runs on PULL REQUESTS ONLY (cost: a green PR already proved main; the post-merge push
# would just re-run it). Branch protection gates merges on these checks; the release trusts
# main and does not re-validate. chore/reboot stays listed for PRs into it (#54).
on:
  pull_request:
    branches: [main, master, chore/reboot]

# Restrict default token scope for all jobs in this workflow.
permissions:
  contents: read

jobs:
  # ── path filter ──────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            run:
              - 'src/runtime/**'
              - 'src/assert/**'
              - '.github/workflows/sast.yml'
              - '.github/sast-baseline.txt'

  # ── clang-tidy audit ─────────────────────────────────────────────────────────
  clang-tidy-audit:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    name: clang-tidy audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-tidy
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list /etc/apt/sources.list.d/azure*.list /etc/apt/sources.list.d/azure-cli*.list 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y clang clang-tidy

      # Teko-only: the compiler is now the released binary and its C twins are FROZEN, so
      # clang-tidy scans the LIVE maintained C — the runtime seam (teko_rt.c) + the assert
      # seed that are linked into every generated program. No cmake / compiler C build.
      - name: Run clang-tidy on the live runtime C
        run: |
          clang-tidy src/runtime/teko_rt.c src/assert/assert.c \
            -checks='-*,clang-analyzer-*,cert-*,bugprone-*,-clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling' \
            -warnings-as-errors='clang-analyzer-security.*,clang-analyzer-core.NullDereference' \
            -- -std=c23 -Isrc/runtime -Isrc/assert \
            2>&1 | tee clang-tidy-results.txt || true

      - name: Upload clang-tidy results
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-results
          path: clang-tidy-results.txt

      - name: Capability audit present
        run: |
          test -f src/checker/capability_audit.md \
            && echo "Capability audit found" \
            || (echo "Missing capability_audit.md — run C9.2 audit"; exit 1)

      - name: Fail on security findings
        run: |
          # Match actual findings: check names appear as [clang-analyzer-...] at end of a
          # diagnostic line. The config/header list prints them without brackets, so requiring
          # '[' avoids false positives from run-clang-tidy's enabled-checks summary.
          if grep -qE '\[clang-analyzer-security\.|\[clang-analyzer-core\.NullDereference' clang-tidy-results.txt; then
            echo "Security findings detected!"
            grep -E '\[clang-analyzer-security\.|\[clang-analyzer-core\.NullDereference' clang-tidy-results.txt
            exit 1
          fi
          echo "No security findings"

      # Baselined checks (issue #54): cert-err33-c + clang-analyzer-core.uninitialized.*
      # gate on NEW findings only. .github/sast-baseline.txt holds the pre-existing
      # (file, check) pairs — line numbers deliberately excluded so ordinary edits don't
      # churn it. A finding in a pair NOT in the baseline fails the job.
      - name: Fail on NEW baselined-check findings
        run: |
          grep -E 'warning:.*\[(cert-err33-c|clang-analyzer-core\.uninitialized\.[A-Za-z]+)\]' clang-tidy-results.txt \
            | sed -E 's|^.*/(src/[^:]+):[0-9]+:[0-9]+: warning: .*\[([a-zA-Z0-9._-]+)\]$|\1 \2|' \
            | sort -u > found-pairs.txt || true
          grep -v '^#' .github/sast-baseline.txt | grep -v '^$' | sort -u > baseline-pairs.txt

          NEW_PAIRS="$(comm -23 found-pairs.txt baseline-pairs.txt)"
          if [ -n "$NEW_PAIRS" ]; then
            echo "NEW cert-err33-c / core.uninitialized.* findings (not in .github/sast-baseline.txt):"
            echo "$NEW_PAIRS"
            echo
            echo "Full diagnostics:"
            while read -r file check; do
              grep -E "/${file//./\\.}:[0-9]+:[0-9]+: warning: .*\[${check//./\\.}\]" clang-tidy-results.txt || true
            done <<< "$NEW_PAIRS"
            echo
            echo "Fix the finding, or (tribunal-level exception) add the pair to .github/sast-baseline.txt."
            exit 1
          fi
          echo "No new baselined-check findings ($(wc -l < found-pairs.txt | tr -d ' ') pre-existing pair groups still baselined)"

  # ── gate: aggregates both SAST jobs ──────────────────────────────────────────
  gate:
    name: SAST gate
    runs-on: ubuntu-latest
    needs: [changes, clang-tidy-audit]
    if: always()
    permissions: {}

    steps:
      - name: Evaluate results
        run: |
          TIDY_RESULT="${{ needs.clang-tidy-audit.result }}"
          CHANGES="${{ needs.changes.outputs.run }}"

          echo "changes.run        = $CHANGES"
          echo "clang-tidy-audit   = $TIDY_RESULT"

          if [ "$CHANGES" != "true" ]; then
            echo "No relevant files changed — gate passes."
            exit 0
          fi

          if [ "$TIDY_RESULT" = "failure" ] || [ "$TIDY_RESULT" = "cancelled" ]; then
            echo "ERROR: clang-tidy-audit $TIDY_RESULT"
            exit 1
          fi

          echo "SAST gate passed."
          exit 0
