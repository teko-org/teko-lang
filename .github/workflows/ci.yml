name: Teko Compiler Multi-Platform CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    name: Build & Test (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Native GitHub-hosted runners (free for public repos) ---
          - os: ubuntu-latest
            label: Linux x86_64 (Clang C23 / Ninja)
            test_bin: ./build/teko_tests
          - os: ubuntu-24.04-arm
            label: Linux arm64 (Clang C23 / Ninja)
            test_bin: ./build/teko_tests
          # macOS is arm64-only here: GitHub is retiring the Intel (macos-13)
          # standard runners, so no macOS x86_64 job.
          - os: macos-latest
            label: macOS arm64 / Apple Silicon (AppleClang)
            test_bin: ./build/teko_tests
          - os: windows-latest
            label: Windows x86_64 (MSVC)
            test_bin: .\build\Release\teko_tests.exe
          - os: windows-11-arm
            label: Windows arm64 (MSVC)
            test_bin: .\build\Release\teko_tests.exe

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # --- Linux: Clang + Ninja (matches the original validated toolchain) ---
      - name: Install Build Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          # The hosted image ships third-party apt sources (microsoft/azure) that
          # intermittently 403 and break `apt-get update`; we only need Ubuntu repos.
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list /etc/apt/sources.list.d/azure*.list /etc/apt/sources.list.d/azure-cli*.list 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y cmake build-essential ninja-build clang

      - name: Configure via CMake (Linux - Clang / Ninja, Release)
        if: runner.os == 'Linux'
        run: cmake -S . -B build -G "Ninja" -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Release

      # --- macOS & Windows: default generator (Unix Makefiles / Visual Studio MSVC) ---
      - name: Configure via CMake (macOS / Windows - default generator, Release)
        if: runner.os != 'Linux'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (Release)
        run: cmake --build build --config Release --parallel 4

      - name: Run Automated Test Suite (Unity Framework Assertions)
        run: ${{ matrix.test_bin }}

  # ---------------------------------------------------------------------------
  # DIAGNOSTIC #1 (temporary, non-blocking): /RTC1 runtime checks. The intermittent
  # Windows x86_64 crash does not reproduce off-Windows under ASan/UBSan/heap+stack
  # poisoning, so the prime suspect is an uninitialized-local read (ASan misses
  # those; a value benign-zero on macOS is garbage on Windows). /RTC1 catches it
  # DETERMINISTICALLY (it tracks initialization, not the value) and needs NO runtime
  # DLL. Run the suite 20x; a failure stamps "Run-Time Check Failure #3 - The
  # variable 'x' is being used without being initialized" with file:line.
  # This is a SEPARATE job so a broken ASan setup can never block this signal.
  # ---------------------------------------------------------------------------
  windows-rtc:
    name: Windows x86_64 /RTC1 uninitialized-read hunt (non-blocking diagnostic)
    runs-on: windows-latest
    continue-on-error: true
    timeout-minutes: 25
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
      - name: Configure + build Debug (/RTC1 is on by default for MSVC Debug)
        shell: pwsh
        run: |
          cmake -S . -B build-rtc -DCMAKE_BUILD_TYPE=Debug
          cmake --build build-rtc --config Debug --parallel 4
      - name: Run suite 20x under /RTC1
        shell: pwsh
        run: |
          $bad = 0
          for ($i = 1; $i -le 20; $i++) {
            Write-Host "===== RTC run $i / 20 ====="
            & .\build-rtc\Debug\teko_tests.exe
            if ($LASTEXITCODE -ne 0) { Write-Host "!!! RTC run $i exited $LASTEXITCODE"; $bad++ }
          }
          Write-Host "RTC1: $bad / 20 runs crashed/failed"
          if ($bad -gt 0) { exit 1 }

  # ---------------------------------------------------------------------------
  # DIAGNOSTIC #2 (temporary, non-blocking): MSVC AddressSanitizer (heap overflow /
  # use-after-free). The first attempt failed to LOAD (0xC0000139 ENTRYPOINT_NOT_
  # FOUND) because the wrong clang_rt.asan_dynamic-x86_64.dll resolved. Here we add
  # the EXACT toolset bin (the one cl.exe used) to PATH via vswhere so the matching
  # ASan runtime DLL loads. Separate job so its setup can't block windows-rtc.
  # ---------------------------------------------------------------------------
  windows-asan:
    name: Windows x86_64 ASan heap hunt (non-blocking diagnostic)
    runs-on: windows-latest
    continue-on-error: true
    timeout-minutes: 25
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
      - name: Configure + build with MSVC AddressSanitizer
        shell: pwsh
        run: |
          cmake -S . -B build-asan -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS="/fsanitize=address /Zi"
          cmake --build build-asan --config Release --parallel 4
      - name: Put the matching ASan runtime DLL on PATH (vswhere -> default toolset)
        shell: pwsh
        run: |
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $ver = (Get-Content "$vs\VC\Auxiliary\Build\Microsoft.VCToolsVersion.default.txt").Trim()
          $bin = "$vs\VC\Tools\MSVC\$ver\bin\Hostx64\x64"
          Write-Host "toolset bin: $bin"
          if (Test-Path "$bin\clang_rt.asan_dynamic-x86_64.dll") { Write-Host "ASan DLL present" } else { Write-Host "WARN: ASan DLL NOT in $bin" }
          Add-Content $env:GITHUB_PATH $bin
      - name: Run suite 20x under ASan
        shell: pwsh
        run: |
          $bad = 0
          for ($i = 1; $i -le 20; $i++) {
            Write-Host "===== ASan run $i / 20 ====="
            & .\build-asan\Release\teko_tests.exe
            if ($LASTEXITCODE -ne 0) { Write-Host "!!! ASan run $i exited $LASTEXITCODE"; $bad++ }
          }
          Write-Host "ASan: $bad / 20 runs crashed/failed"
          if ($bad -gt 0) { exit 1 }

  # ---------------------------------------------------------------------------
  # riscv64 has NO native GitHub-hosted runner. We cross-compile a static
  # riscv64 binary and run the suite under QEMU user-mode emulation (Linux only;
  # emulating riscv on Windows/macOS is impractical). Emulation is slow, and this
  # is extra signal rather than a gate, so the job is non-blocking for now
  # (continue-on-error). Promote to blocking once it proves stable.
  # ---------------------------------------------------------------------------
  riscv64-qemu:
    name: Build & Test (Linux riscv64 — QEMU emulated, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install riscv64 cross toolchain + QEMU user-mode
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list /etc/apt/sources.list.d/azure*.list /etc/apt/sources.list.d/azure-cli*.list 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-riscv64-linux-gnu qemu-user-static

      - name: Configure via CMake (cross riscv64, static, Release)
        run: |
          cmake -S . -B build -G "Ninja" \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=riscv64 \
            -DCMAKE_C_COMPILER=riscv64-linux-gnu-gcc \
            -DCMAKE_C_FLAGS="-static" \
            -DCMAKE_EXE_LINKER_FLAGS="-static" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build (cross-compile riscv64)
        run: cmake --build build --parallel 4

      - name: Run test suite under QEMU (emulated riscv64, slow)
        run: qemu-riscv64-static ./build/teko_tests

  # ---------------------------------------------------------------------------
  # Phase 10 WASM concurrency backend. These jobs build the compiler, emit a REAL
  # spawn + blocking-channel module from the Teko backend (emit-demo), and run it
  # — plus the hand-written reference fixtures — under a standalone engine and a
  # headless browser to guarantee behavioral parity. Now gating (the backend is
  # stable: emitted.wasm round-trips a channel through a spawned green thread,
  # main() == 7). See runtime/wasm/README.md.
  # ---------------------------------------------------------------------------
  wasm-wasmtime:
    name: WASM exec — emitter + references under Node + wasmtime
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
      - name: Install toolchain (clang / ninja / WABT) + wasmtime
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list /etc/apt/sources.list.d/azure*.list /etc/apt/sources.list.d/azure-cli*.list 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang wabt
          curl https://wasmtime.dev/install.sh -sSf | bash
      - name: Build the compiler core (Release) -> libteko_core.a
        run: |
          cmake -S . -B build -G "Ninja" -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target teko_core --parallel 4
      - name: Emit real concurrency modules from the Teko backend
        run: |
          cc -I src runtime/wasm/emit-demo/emit_spawn_channel.c build/libteko_core.a -o emit_spawn_channel
          cc -I src runtime/wasm/emit-demo/emit_suspend.c       build/libteko_core.a -o emit_suspend
          cc -I src runtime/wasm/emit-demo/emit_multi.c         build/libteko_core.a -o emit_multi
          ./emit_spawn_channel runtime/wasm/samples/emitted.wat
          ./emit_suspend        runtime/wasm/samples/emitted_suspend.wat
          ./emit_multi          runtime/wasm/samples/emitted_multi.wat
      - name: Assemble all modules (wat2wasm)
        run: |
          wat2wasm runtime/wasm/samples/channels.wat        -o runtime/wasm/samples/channels.wasm
          wat2wasm runtime/wasm/samples/scheduler.wat       -o runtime/wasm/samples/scheduler.wasm
          wat2wasm runtime/wasm/samples/emitted.wat         -o runtime/wasm/samples/emitted.wasm
          wat2wasm runtime/wasm/samples/emitted_suspend.wat -o runtime/wasm/samples/emitted_suspend.wasm
          wat2wasm runtime/wasm/samples/emitted_multi.wat   -o runtime/wasm/samples/emitted_multi.wasm
      - name: Run under Node (channels=42, scheduler=15, emitted=7, suspend=30)
        run: node runtime/wasm/run-node.mjs
      - name: Run under wasmtime
        run: |
          ~/.wasmtime/bin/wasmtime run --invoke test runtime/wasm/samples/channels.wasm
          ~/.wasmtime/bin/wasmtime run --invoke test runtime/wasm/samples/scheduler.wasm
          ~/.wasmtime/bin/wasmtime run --invoke main runtime/wasm/samples/emitted.wasm
          ~/.wasmtime/bin/wasmtime run --invoke main runtime/wasm/samples/emitted_suspend.wasm
          ~/.wasmtime/bin/wasmtime run --invoke main runtime/wasm/samples/emitted_multi.wasm

  wasm-browser:
    name: WASM exec — headless Chromium, COOP/COEP
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install toolchain (clang / ninja / WABT)
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list /etc/apt/sources.list.d/azure*.list /etc/apt/sources.list.d/azure-cli*.list 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang wabt
      - name: Build the compiler core (Release) -> libteko_core.a
        run: |
          cmake -S . -B build -G "Ninja" -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target teko_core --parallel 4
      - name: Emit real concurrency modules from the Teko backend
        run: |
          cc -I src runtime/wasm/emit-demo/emit_spawn_channel.c build/libteko_core.a -o emit_spawn_channel
          cc -I src runtime/wasm/emit-demo/emit_suspend.c       build/libteko_core.a -o emit_suspend
          cc -I src runtime/wasm/emit-demo/emit_multi.c         build/libteko_core.a -o emit_multi
          ./emit_spawn_channel runtime/wasm/samples/emitted.wat
          ./emit_suspend        runtime/wasm/samples/emitted_suspend.wat
          ./emit_multi          runtime/wasm/samples/emitted_multi.wat
      - name: Assemble all modules (wat2wasm)
        run: |
          wat2wasm runtime/wasm/samples/channels.wat        -o runtime/wasm/samples/channels.wasm
          wat2wasm runtime/wasm/samples/scheduler.wat       -o runtime/wasm/samples/scheduler.wasm
          wat2wasm runtime/wasm/samples/emitted.wat         -o runtime/wasm/samples/emitted.wasm
          wat2wasm runtime/wasm/samples/emitted_suspend.wat -o runtime/wasm/samples/emitted_suspend.wasm
          wat2wasm runtime/wasm/samples/emitted_multi.wat   -o runtime/wasm/samples/emitted_multi.wasm
      - name: Install harness deps + Chromium
        working-directory: runtime/wasm
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run headless-browser harness (parity + crossOriginIsolated check)
        working-directory: runtime/wasm
        run: node run-browser.mjs

  # ---------------------------------------------------------------------------
  # Phase 10.4 Layer B (`--target=...-wasm-threads`): real multicore. Build the
  # compiler, emit the shared-memory + atomics module from the backend, and run it
  # on a REAL OS thread via node worker_threads — a spawned Worker re-instantiates
  # the module against the shared memory and hands a value back over the atomic
  # channel (reference=777, emitted=99). The channel receive busy-polls the flag
  # with i32.atomic.load rather than memory.atomic.wait32, because that wait/notify
  # primitive never makes progress across instances on this runner; plain shared
  # atomics are reliable. timeout-minutes is a backstop so it can never hang.
  # ---------------------------------------------------------------------------
  wasm-threads-node:
    name: WASM-threads exec — node worker_threads (Layer B)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install toolchain (clang / ninja / WABT)
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list /etc/apt/sources.list.d/azure*.list /etc/apt/sources.list.d/azure-cli*.list 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang wabt
      - name: Build the compiler core (Release) -> libteko_core.a
        run: |
          cmake -S . -B build -G "Ninja" -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target teko_core --parallel 4
      - name: Emit the wasm-threads module from the Teko backend
        run: |
          cc -I src runtime/wasm/emit-demo/emit_threads.c build/libteko_core.a -o emit_threads
          ./emit_threads runtime/wasm/samples/emitted_threads.wat
      - name: Assemble the shared-memory modules (wat2wasm --enable-threads)
        run: |
          wat2wasm --enable-threads runtime/wasm/samples/threads.wat         -o runtime/wasm/samples/threads.wasm
          wat2wasm --enable-threads runtime/wasm/samples/emitted_threads.wat -o runtime/wasm/samples/emitted_threads.wasm
      - name: Run under node worker_threads (real OS threads; reference=777, emitted=99)
        env:
          TEKO_THREADS_TIMEOUT_MS: '25000'
        run: node runtime/wasm/threads/run-node-threads.mjs

  # ---------------------------------------------------------------------------
  # Layer B in a real browser: shared memory + atomics across Web Workers, served
  # with COOP/COEP (crossOriginIsolated). main() runs inside a runner Worker (where
  # blocking on memory.atomic.wait32 is permitted). This is the GATING Layer B
  # signal — it has passed consistently; the node worker_threads job above is the
  # flaky one and is non-blocking.
  # ---------------------------------------------------------------------------
  wasm-threads-browser:
    name: WASM-threads exec — headless Chromium Web Workers (Layer B)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install toolchain (clang / ninja / WABT)
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list /etc/apt/sources.list.d/azure*.list /etc/apt/sources.list.d/azure-cli*.list 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang wabt
      - name: Build the compiler core (Release) -> libteko_core.a
        run: |
          cmake -S . -B build -G "Ninja" -DCMAKE_C_COMPILER=clang -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target teko_core --parallel 4
      - name: Emit the wasm-threads module from the Teko backend
        run: |
          cc -I src runtime/wasm/emit-demo/emit_threads.c build/libteko_core.a -o emit_threads
          ./emit_threads runtime/wasm/samples/emitted_threads.wat
      - name: Assemble the shared-memory modules (wat2wasm --enable-threads)
        run: |
          wat2wasm --enable-threads runtime/wasm/samples/threads.wat         -o runtime/wasm/samples/threads.wasm
          wat2wasm --enable-threads runtime/wasm/samples/emitted_threads.wat -o runtime/wasm/samples/emitted_threads.wasm
      - name: Install harness deps + Chromium
        working-directory: runtime/wasm
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run headless-browser Layer B harness (Web Workers + crossOriginIsolated)
        working-directory: runtime/wasm
        run: node run-threads-browser.mjs
