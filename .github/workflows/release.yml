name: Bootstrap Release

# Publication of a Teko release: per-platform `teko` binaries + the portable, any-cc
# `teko.c` bootstrap snapshot + checksums, as a GitHub Release.
#
# CI IS THE SINGLE SOURCE OF TRUTH — the release RE-VALIDATES NOTHING. A tag only ever
# points at a main commit, and a commit only reaches main through a pull request whose full
# CI suite (Native Build & Test + SAST + Sanitizers + CodeQL) closed green — branch
# protection blocks a red PR from merging. So "on main" already means "CI was 100% green".
# Re-running the gate / the gen-2/gen-3 self-host chain / the fixpoint / the VM==native
# differential here would just burn pipeline minutes re-proving what the PR already proved.
# The release therefore only BUILDS and PUBLISHES.
#
# Build model: ONE generation per artifact. The x86_64 seed (the previous release) compiles
# THIS tag's corpus once into the portable `teko.c`; `zig cc` then cross-compiles that single
# `teko.c` into all six Linux artifacts (glibc + musl × x86_64 / arm64 / riscv64) from one
# runner, and the macOS/Windows runners each seed-and-build natively. Codegen is
# deterministic and CI already proved the self-host fixpoint, so one generation IS the
# fixpoint artifact.
on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Release version / tag. LEAVE EMPTY to use the teko.tkp-derived tag
          (the manifest is the source of truth). Provide a value ONLY to override
          for a one-off.
        required: false
        default: ""
      dry_run:
        description: >-
          Build + package every target and upload the artifacts, but DO NOT publish a
          GitHub Release. Use to validate the pipeline end-to-end before a real tag.
        required: false
        default: "false"
  push:
    tags:
      - "*-alpha"
      - "*-beta"        # wave-umbrella intermediate seeds (0.1.0.N-beta) + wave releases on main
      - "*-bootstrap"   # legacy line; new tags are -alpha

# Publishing a Release requires write access to repository contents.
permissions:
  contents: write

jobs:
  # ── resolve the version once — the teko.tkp manifest is the SOURCE OF TRUTH ────
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.pick.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive tag from teko.tkp
        id: derive
        run: |
          DERIVED="$(sh scripts/derive_version.sh)"
          echo "derived=$DERIVED" >> "$GITHUB_OUTPUT"
          echo "teko.tkp-derived tag = $DERIVED"

      - name: Pick version
        id: pick
        env:
          DERIVED: ${{ steps.derive.outputs.derived }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            V="${GITHUB_REF#refs/tags/}"
            if [ "$V" != "$DERIVED" ]; then
              echo "::error::Pushed tag '$V' does not match the teko.tkp-derived tag '$DERIVED'." >&2
              echo "The manifest (teko.tkp) is the source of truth — bump its 'version'/'suffix'" >&2
              echo "so the derived tag becomes '$V', or push the tag the manifest sanctions." >&2
              exit 1
            fi
            echo "Pushed tag '$V' matches the manifest-derived tag — OK."
          elif [ -n "$INPUT_VERSION" ]; then
            V="$INPUT_VERSION"
            echo "Using workflow_dispatch override version = $V (manifest-derived was $DERIVED)"
          else
            V="$DERIVED"
            echo "workflow_dispatch input empty — using manifest-derived version = $V"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Release version = $V"

  # ── Linux: ONE runner, ONE emit, six zig-cross artifacts ──────────────────────
  # The x86_64 seed compiles THIS tag's corpus once (`--no-verify` — no gate; CI already
  # verified this commit) into the portable `out/teko.c`. `zig cc` then cross-compiles that
  # single C into six artifacts: glibc (dynamic, pinned to an old glibc for wide compat) and
  # musl (fully static) for x86_64, arm64 and riscv64. `zig` ships a complete cross toolchain
  # (clang + both libcs + all three arches), so no qemu, no per-arch runner, no musl-cross
  # packages — and it handles the runtime's `__int128` / C23 exactly like the native builds.
  build-linux:
    needs: version
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      # 0.16.0 is the version validated locally + in a linux/amd64 container. 0.13.0 ships an
      # INCOMPLETE riscv64 glibc (missing gnu/stubs-lp64d.h) → riscv64-glibc failed to compile;
      # 0.16.0's tarball carries riscv-linux-gnu/gnu/stubs-lp64d.h. Note the tarball name format
      # changed at 0.14.1: os/arch swapped to `zig-x86_64-linux-<v>` (was `zig-linux-x86_64-<v>`).
      ZIG_VERSION: "0.16.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zig (official tarball)
        run: |
          set -eu
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" \
            | tar -xJ
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Verify zig
        run: zig version

      # Seed the x86_64 compiler from the previous release and emit THIS tag's teko.c once.
      - name: Provision x86_64 seed
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/ci_provision_teko.sh linux-x86_64-glibc

      # Three self-host generations, all `--no-verify` (CI already gated this commit):
      # seed→gen1→gen2→gen3. The PUBLISHED artifact is gen3 — the binary produced by the
      # self-hosted chain of THIS tag, not by the previous release's seed — and gen2==gen3
      # byte-identity is asserted here as the release's own FIXPOINT gate (owner ruling
      # 2026-07-10, from B1 on).
      #
      # Deliberately NOT `--release`: this leg only needs the byte-identical `out/teko.c`
      # (the gen binaries are discarded — the SHIPPED Linux artifacts are cross-compiled from
      # that teko.c by `zig cc` below). The `zig cc` step now builds Linux at `-O2` too: both
      # x86_64 UBs that used to force `-O0` are fixed (#283's uninitialized temp + #577's
      # noinline closing the `-O1`/`-O2` false `argument type mismatch`), VERIFIED 2026-07-15 —
      # zig `-O0`/`-O1`/`-O2` all self-host with byte-identical `teko.c`. So the `-O2` seed-speed
      # win (owner ruling 2026-07-14) now lands on the Linux seed as well; the x86_64 cross-smoke
      # RUNS the artifact so any regression re-reddens. See scripts/cross_compile_linux.sh.
      - name: Emit the portable teko.c (gen3 of 3, no gate)
        run: |
          set -eu
          mkdir -p gen1 gen2 out
          teko . -o gen1 --no-verify
          ./gen1/teko . -o gen2 --no-verify
          ./gen2/teko . -o out --no-verify
          cmp gen2/teko.c out/teko.c && echo "fixpoint OK: gen2.c == gen3.c ($(wc -c < out/teko.c) bytes)"

      # Cross-compile out/teko.c into all six Linux artifacts and package each. The exact same
      # script (scripts/cross_compile_linux.sh) runs as a compile-only SMOKE in native.yml on
      # every PR — so a broken zig version or target is caught before merge, not here.
      - name: Cross-compile + package the six Linux targets
        run: |
          mkdir -p dist
          sh scripts/cross_compile_linux.sh out/teko.c src dist package
          echo "=== dist/ ==="; ls -la dist/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/
          if-no-files-found: error
          retention-days: 7

  # ── macOS + Windows: native seed-and-build (their libc/ABI needs the real platform) ──
  build-native:
    needs: version
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos-arm64
            ostype: posix
            install_deps: ""
          - os: windows-latest
            label: windows-x86_64
            ostype: windows
            install_deps: ""
          - os: windows-11-arm
            label: windows-arm64
            ostype: windows
            install_deps: ""

    name: release build / ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cc
        if: matrix.install_deps != ''
        run: ${{ matrix.install_deps }}

      - name: Provision seed from the latest release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL: ${{ matrix.label }}
        run: ./scripts/ci_provision_teko.sh "$LABEL"

      # Three self-host generations, all `--no-verify` — the PUBLISHED binary is gen3
      # (built by THIS tag's own self-hosted chain), with gen2==gen3 asserted as the
      # release's fixpoint gate (owner ruling 2026-07-10, from B1 on). `shell: bash` on
      # all platforms: the seed is added to $GITHUB_PATH as a POSIX path, which only
      # bash resolves on Windows.
      #
      # `--release` on all three generations builds every link at `-O2` (owner ruling
      # 2026-07-14): the published macOS/Windows seed is compiled optimized once here, so
      # everyone downstream gets a compiler that RUNS ~1.30x faster (the diagnostic measured
      # 168.7s → 129.6s at -O2), paying the heavier cc cost (~+33s) only at release. Applying
      # it to the whole chain SELF-PROVES the -O2 binary: gen1(-O2) builds gen2, gen2(-O2)
      # builds out, so any -O2 problem fails the build loudly instead of shipping. -O2 emits
      # BYTE-IDENTICAL teko.c (proven by cmp), so the gen2==gen3 fixpoint below is unchanged.
      - name: Build the release binary (gen3 of 3, no gate)
        shell: bash
        run: |
          set -eu
          BIN=teko; [ "${{ matrix.ostype }}" = "windows" ] && BIN=teko.exe
          mkdir -p gen1 gen2 out
          teko . -o gen1 --no-verify --release
          "./gen1/$BIN" . -o gen2 --no-verify --release
          "./gen2/$BIN" . -o out --no-verify --release
          cmp gen2/teko.c out/teko.c && echo "fixpoint OK: gen2.c == gen3.c ($(wc -c < out/teko.c) bytes)"

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          sh scripts/package_release.sh "${{ matrix.label }}" out src dist "${{ matrix.ostype }}"

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  # ── publish: only if every build succeeded AND this is not a dry run ───────────
  # `needs: [version, build-linux, build-native]` — if any leg failed/cancelled, neither
  # build is "success" and this job is skipped, so no release is ever published from a
  # partial matrix. A dry-run dispatch builds+uploads everything but stops here.
  publish:
    needs: [version, build-linux, build-native]
    if: ${{ success() && github.event.inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts + combine checksums
        run: |
          mkdir -p release
          # Each release-<name>/ holds that platform's archive(s) + its SHA256SUMS-*.txt.
          find artifacts -type f -exec cp {} release/ \;
          # Merge the per-platform checksum files into one canonical SHA256SUMS.txt.
          ( cd release && cat SHA256SUMS-*.txt | sort -u > SHA256SUMS.txt )
          echo "=== release/ contents ==="
          ls -la release/
          echo "=== combined SHA256SUMS.txt ==="
          cat release/SHA256SUMS.txt

      - name: Write release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ needs.version.outputs.version }}"
          cat > release/NOTES.md <<EOF
          # Teko $V

          Self-hosted \`teko\` compiler binaries. Each binary was produced by the previous
          release's compiler compiling this tag's own sources; **correctness was verified by
          CI** on this exact commit before it reached main (the \`.tkt\` gate, the self-host
          fixpoint \`gen-2 == gen-3\`, and the VM==native differential all ran in the
          \`Native Build & Test\` / SAST / Sanitizers / CodeQL workflows on the merged PR).
          The release itself re-validates nothing — CI is the single source of truth.

          ## Artifacts
          Linux ships **glibc** (dynamic; needs glibc ≥ 2.28) and **musl** (fully static;
          runs anywhere) for **x86_64**, **arm64** and **riscv64**:
          - \`teko-linux-{x86_64,arm64,riscv64}-glibc.tar.gz\`
          - \`teko-linux-{x86_64,arm64,riscv64}-musl.tar.gz\`
          - \`teko-macos-arm64.tar.gz\`, \`teko-windows-x86_64.zip\`, \`teko-windows-arm64.zip\`
          - \`teko-bootstrap-src.tar.gz\` — the portable, **any-cc** bootstrap snapshot: the
            generated \`teko.c\` plus the exact minimal runtime it links.
          - \`SHA256SUMS.txt\` — checksums of every artifact.

          ## Building from the portable \`teko.c\` snapshot
          Unpack \`teko-bootstrap-src.tar.gz\` and build with any C23 compiler:

          \`\`\`sh
          tar xzf teko-bootstrap-src.tar.gz
          cd teko-bootstrap-src
          cc -std=c23 -Iruntime -Iassert \\
             teko.c runtime/teko_rt.c assert/assert.c \\
             -lm -o teko          # or run ./build.sh
          \`\`\`

          The bundle carries exactly what a from-scratch \`cc\` needs: \`teko.c\`,
          \`runtime/teko_rt.{c,h}\`, \`assert/assert.{c,h}\`, and \`win32_compat.h\`. MSVC is
          not supported — the runtime uses \`__int128\` and other GCC/Clang extensions.
          EOF
          echo "wrote release/NOTES.md"

          # Append GitHub's auto-generated changelog against the CORRECT predecessor.
          # GitHub's /releases API is NOT version-ordered, so its auto-picked "previous tag"
          # is wrong. Compute the predecessor by VERSION — the highest published version-tag
          # below this one (across old no-v and new v- tags) — and pass it to generate-notes.
          PRED="$(gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
            --jq 'map(select(.draft | not) | .tag_name)[] | select(test("^v?[0-9]+([.][0-9]+){3}"))' \
            | grep -vxF "$V" \
            | awk '{ o=$0; v=$0; sub(/^v/,"",v); print v"\t"o }' | sort -V | tail -n1 | cut -f2)"
          if [ -n "$PRED" ]; then
            echo "changelog predecessor (by version) = $PRED"
            BODY="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="$V" -f previous_tag_name="$PRED" --jq '.body' 2>/dev/null || true)"
            if [ -n "$BODY" ]; then
              { printf '\n\n## Changes since %s\n\n' "$PRED"; printf '%s\n' "$BODY"; } >> release/NOTES.md
              echo "appended changelog vs $PRED"
            else
              echo "generate-notes returned empty — keeping static notes only"
            fi
          else
            echo "no predecessor version-tag found — first release, no changelog"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ needs.version.outputs.version }}"
          # Idempotent: replace assets if the release already exists, else create it.
          if gh release view "$V" >/dev/null 2>&1; then
            echo "Release $V exists — uploading assets (clobber)."
            gh release upload "$V" release/teko-*.tar.gz release/teko-*.zip release/SHA256SUMS.txt --clobber || true
            gh release edit "$V" --notes-file release/NOTES.md
          else
            echo "Creating release $V."
            ASSETS=""
            for f in release/teko-*.tar.gz release/teko-*.zip release/SHA256SUMS.txt; do
              [ -e "$f" ] && ASSETS="$ASSETS $f"
            done
            PRERELEASE=""
            case "$V" in *-*) PRERELEASE="--prerelease" ;; esac
            # shellcheck disable=SC2086
            gh release create "$V" \
              --title "Teko $V" \
              --notes-file release/NOTES.md \
              $PRERELEASE \
              $ASSETS
          fi
